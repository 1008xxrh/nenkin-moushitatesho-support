// ---- 通院記録から、毎回その場で通院空白（ギャップ）を計算する ----
// 保存するのはユーザーが入力した「理由」だけ（state.gapReasonsByKey）。
// 期間そのものは常にhospitalsから導出するので、病院を後から追加・修正・削除しても自動的に追従する。
function computeGaps(){
  const sorted = [...state.hospitals]
    .filter(h=>h.fromYear) // 年が入っていない記録は並べ替え対象から除外（フォールバック）
    .sort((a,b)=> (parseInt(a.fromYear)||0) - (parseInt(b.fromYear)||0));
  const gaps = [];
  for(let i=0;i<sorted.length-1;i++){
    const older = sorted[i];
    const newer = sorted[i+1];
    const olderToY = older.ongoing ? null : parseInt(older.toYear);
    const newerFromY = parseInt(newer.fromYear);
    if(olderToY && newerFromY && (newerFromY - olderToY) >= 1){
      const key = `${older.hospitalId}__${newer.hospitalId}`;
      gaps.push({
        key,
        fromLabel: `${older.toYear || '?'}年${older.toMonth || ''}頃`,
        toLabel: `${newer.fromYear || '?'}年${newer.fromMonth || ''}頃`,
        reasons: state.gapReasonsByKey[key] || []
      });
    }
  }
  return gaps;
}

// ---- 「理由が入力済みか」の判定ルール（この基準で全体を統一する） ----
// gapReasonsByKey[key] が存在し、かつ1件以上の理由が入っている場合のみ「入力済み」。
// undefined、もしくは空配列の場合は「未入力」として扱う。
function isGapReasonAnswered(key){
  const reasons = state.gapReasonsByKey[key];
  return Array.isArray(reasons) && reasons.length > 0;
}

// 理由が未入力のgapを先頭から1件だけ返す（なければnull）。
// 一覧を同時に編集させる方式ではなく、必ず1件ずつ確認させるための入口。
function findFirstUnansweredGap(){
  const gaps = computeGaps();
  return gaps.find(g => !isGapReasonAnswered(g.key)) || null;
}

// ---- 通院空白確認フェーズ（第4章B） ----
// 1画面で1gapだけを処理する。保存したら次の未入力gapを再取得して同じ画面にとどまり、
// 未入力gapがなくなった時点でch4_summaryに戻る（afterGapReviewActionが'go_ch5'なら続けて第5章へ）。
function stepCh4GapReview(){
  const target = findFirstUnansweredGap();
  if(!target){
    // 未入力gapがもうない＝確認完了。フラグに応じて第5章へ進むか、summaryに戻るだけ
    const action = state.afterGapReviewAction;
    state.afterGapReviewAction = null;
    if(action === 'go_ch5'){
      finishChapter('ch4', 'ch5_intro');
    } else {
      goTo('ch4_summary');
    }
    return;
  }
  const gaps = computeGaps();
  const remainingCount = gaps.filter(g => !isGapReasonAnswered(g.key)).length;
  const progressHtml = remainingCount > 1
    ? `<p class="small" style="margin:-4px 0 10px;">通院していない期間が複数見つかりました。あと${remainingCount}件、順番にお聞きします。</p>`
    : '';
  document.getElementById('screen').innerHTML = `
    <div class="card">
      ${progressHtml}
      <p class="hint">${esc(target.fromLabel)} から ${esc(target.toLabel)} までの間は、通院の記録がありませんでした。</p>
      <h2>この時期のことを少し教えてください</h2>
      <div id="gapReasons"></div>
      <p class="small" style="margin-top:14px;">どんな理由も審査の参考になります。正直に選んで大丈夫です。</p>
    </div>`;
  state.tempGapReasons = [...(state.gapReasonsByKey[target.key] || [])];
  renderStringCheckList('gapReasons', GAP_REASONS.map(l=>[l,l]), state.tempGapReasons);
  setFooter({secondaryLabel:'戻る', secondaryFn:goBack, primaryLabel:'次へ', primaryEnabled:true, primaryFn:()=>{
    state.gapReasonsByKey[target.key] = [...state.tempGapReasons];
    state.tempGapReasons = [];
    // この画面にとどまったまま再描画し、次の未入力gapを探す（一覧を一括編集する形にはしない）
    stepCh4GapReview();
  }});
}


function stepCh4Summary(){
  const orderedIdx = [...state.hospitals.keys()].reverse();
  const combined = [];
  orderedIdx.forEach(idx=>{
    const h = state.hospitals[idx];
    combined.push({type:'hospital', sortKey: parseInt(h.fromYear) || 0, data:h});
  });
  const gaps = computeGaps();
  gaps.forEach(g=>{
    const m = (g.fromLabel || '').match(/\d+/);
    const y = m ? parseInt(m[0]) : 0;
    combined.push({type:'gap', sortKey: y + 0.5, data:g});
  });
  combined.sort((a,b)=>a.sortKey - b.sortKey);
  const rowsHtml = combined.map(item=>{
    if(item.type==='hospital'){
      const h = item.data;
      const fromLabel = `${h.fromYear || '?'}年${h.fromMonth || ''}`;
      const toLabel = h.ongoing ? '現在' : `${h.toYear || '?'}年${h.toMonth || ''}`;
      const name = h.nameUnknown ? `（病院名不明・${esc(h.hospitalType) || '種類不明'}）` : (esc(h.name) || '（未入力）');
      const relatedNote = (h.relatedEvents && h.relatedEvents.length)
        ? `<div class="small" style="margin-top:-6px;margin-bottom:8px;">手がかり：${h.relatedEvents.map(k=>esc(findEventLabel(k))).join('・')}</div>`
        : '';
      return `<div class="timeline-row"><span>${fromLabel}〜${toLabel}　${name}</span>${badgeForConfidence(h.confidence)}</div>${relatedNote}<button type="button" class="link-btn" data-edit-hospital="${h.hospitalId}" style="margin:-4px 0 8px;">この通院記録を修正する →</button>`;
    }
    const g = item.data;
    const answered = isGapReasonAnswered(g.key);
    const statusBadge = answered
      ? '<span class="badge badge-good">理由を確認済み</span>'
      : '<span class="badge badge-warn">理由が未確認</span>';
    return `<div class="timeline-row gap"><span>${esc(g.fromLabel)}〜${esc(g.toLabel)}は、通院していない時期です</span>${statusBadge}</div>`;
  }).join('');

  const unansweredCount = gaps.filter(g=>!isGapReasonAnswered(g.key)).length;
  const gapStatusHtml = gaps.length===0
    ? ''
    : (unansweredCount > 0
        ? `<p class="hint" style="margin-top:12px;">通院していない時期が${gaps.length}件見つかりました。そのうち${unansweredCount}件、まだ理由を確認していません。</p>`
        : `<p class="small" style="margin-top:12px;color:var(--accent-strong);">通院していない時期について、理由の確認が済んでいます。</p>`);

  document.getElementById('screen').innerHTML = `
    <div class="card">
      <h2>通院の記録が集まりました</h2>
      ${rowsHtml || '<p class="small">記録がありません</p>'}
      ${gapStatusHtml}
      <div class="edit-section" style="margin-top:18px;">
        <button type="button" id="addHospitalBtn" style="width:100%;padding:12px;border-radius:8px;border:1px solid var(--accent-strong);background:#fff;color:var(--accent-strong);font-size:15px;cursor:pointer;margin-bottom:10px;">病院を追加する</button>
        ${gaps.length>0 ? `<button type="button" id="reviewGapsBtn" style="width:100%;padding:12px;border-radius:8px;border:none;background:${unansweredCount>0 ? 'var(--accent-strong)' : '#fff'};color:${unansweredCount>0 ? '#fff' : 'var(--accent-strong)'};${unansweredCount===0 ? 'border:1px solid var(--accent-strong);' : ''}font-size:15px;cursor:pointer;margin-bottom:10px;">この内容で通院空白を確認する</button>` : ''}
      </div>
    </div>`;
  document.querySelectorAll('[data-edit-hospital]').forEach(btn=>{
    btn.onclick = ()=>{
      const id = parseInt(btn.getAttribute('data-edit-hospital'));
      const h = state.hospitals.find(h=>h.hospitalId===id);
      state.editingHospitalId = id;
      state.draft = {...h};
      goTo('ch4_hospital_name');
    };
  });
  document.getElementById('addHospitalBtn').onclick = ()=>{
    state.draft = {};
    state.editingHospitalId = null;
    goTo('ch4_hospital_name');
  };
  const reviewBtn = document.getElementById('reviewGapsBtn');
  if(reviewBtn){
    reviewBtn.onclick = ()=>{
      state.afterGapReviewAction = null; // summaryから入った場合は確認後summaryに戻るだけでよい
      goTo('ch4_gap_review');
    };
  }
  setFooter({secondaryLabel:'戻る', secondaryFn:goBack, primaryLabel:'第5章へ進む', primaryEnabled:true, primaryFn:()=>{
    // 理由未入力のgapが残っている場合は、第5章へ直接進めず、確認を済ませてから進める
    if(findFirstUnansweredGap()){
      state.afterGapReviewAction = 'go_ch5';
      goTo('ch4_gap_review');
      return;
    }
    finishChapter('ch4','ch5_intro');
  }});
}

// ch5_preview：申立書の下書き確認（HTML申立書プレビュー画面仕様書v4）
// 役割：「病歴・就労状況等申立書が実際に完成していく様子」を体験する画面。
// 第1段階＝紙面再現を最優先（編集機能なし）。仕様書0章・2章を参照。
// 表示内容はexportToOfficialForm()と同じデータソース（state / buildCurrentPeriodRows等）
// から組み立てる。新規の集計ロジックは作らない（v3から継続する原則）。
// =====================================================================

// ---- 通院期間・通院していない期間の全件行（mainRows+continuationRows）を、
//      exportToOfficialForm()と同じ手順（buildCurrentPeriodRows→圧縮→割り振り）で取得する。
//      件数超過時（compressPastRowsIfNeeded()がエラーを返す場合）はエラー情報も返す。
function buildPreviewPeriodRows(){
  const currentRows = buildCurrentPeriodRows();
  const availableSlotsForPast = Math.max(0, 16 - currentRows.length);
  const compressed = compressPastRowsIfNeeded(state.pastFragments, state.pastHospitals, availableSlotsForPast);
  if(compressed && compressed.error){
    return { rows: compressed.rows, error: compressed.message };
  }
  const { mainRows, continuationRows } = allocateRowsToMainAndContinuation(currentRows, compressed);
  return { rows: mainRows.concat(continuationRows), error: null };
}

// ---- 元号セレクタ風表示（仕様書2.2節4番）。和暦が決まらない場合は実物のプレースホルダーを出す。 ----
function renderPreviewEraHtml(year){
  const [g] = yearToWareki(parseInt(year, 10));
  if(!g){
    return `<span class="pp-date-placeholder">元号を選んでください</span>`;
  }
  const eras = ['昭和','平成','令和'];
  return `<span class="pp-era">${eras.map(e=>`<span class="pp-era-opt${e===g ? ' pp-selected' : ''}">${e}</span>`).join('')}</span>`;
}

// ---- チェックボックス（□にレ点、仕様書2.2節3番）。labelは両方表示し、選ばれた方だけ強調する。 ----
function renderPreviewCheckboxPairHtml(labelA, checkedA, labelB, checkedB){
  return `<span class="pp-checkbox${checkedA?' pp-checked':''}"><span class="pp-checkbox-box">レ</span>${esc(labelA)}</span>` +
         `<span class="pp-checkbox${checkedB?' pp-checked':''}"><span class="pp-checkbox-box">レ</span>${esc(labelB)}</span>`;
}

// ---- 通院期間セクションのHTML（紙面本体用、年表のマス目）。全件表示・要約しない。 ----
function renderPreviewPeriodRowsHtml(rows){
  if(!rows.length){
    return `<div class="pp-period-row"><div class="pp-period-num">1</div><div class="pp-period-body"><div class="pp-period-dates pp-blank">未入力</div><div class="pp-period-note pp-blank">記録がありません</div></div></div>`;
  }
  return rows.map((r,i)=>{
    const fromHtml = r.fromKind==='none' ? `<span class="pp-blank">${esc(r.fromLabel)}</span>` : `${renderPreviewEraHtml(r.fromYear)}　${r.fromYear?esc(yearToWareki(r.fromYear)[1]):''}年　${r.fromMonth||''}月から`;
    const toHtml = r.toKind==='none' ? `<span class="pp-blank">${esc(r.toLabel)}</span>` : `${renderPreviewEraHtml(r.toYear)}　${r.toYear?esc(yearToWareki(r.toYear)[1]):''}年　${r.toMonth||''}月まで`;
    const visitedHtml = r.fromKind==='none' ? '' : `<div style="margin-top:3px;">${renderPreviewCheckboxPairHtml('受診した', r.visited, '受診していない', !r.visited)}</div>`;
    const hospitalHtml = r.hospitalName ? `<div class="pp-period-hospital">${esc(r.hospitalName)}</div>` : (r.fromKind==='none' ? '' : `<div class="pp-period-hospital pp-blank">医療機関名</div>`);
    return `<div class="pp-period-row">
      <div class="pp-period-num">${i+1}</div>
      <div class="pp-period-body">
        <div class="pp-period-dates">
          <div>${fromHtml}</div>
          <div>${toHtml}</div>
          ${visitedHtml}
          ${hospitalHtml}
        </div>
        <div class="pp-period-note">${r.note ? esc(r.note) : '<span class="pp-blank">左の期間の状況</span>'}</div>
      </div>
    </div>`;
  }).join('');
}

// ---- ADL10項目の選択枠（丸数字、仕様書2.2節2番）。ADL_LEVELSの並び順＝実物の1〜4に対応。 ----
function renderPreviewAdlGridHtml(adl){
  const items = ADL_ITEMS.map(([key,label])=>{
    const current = (adl||{})[key];
    const numsHtml = ADL_LEVELS.map((level, idx)=>{
      const selected = current === level;
      return `<span class="pp-adl-num${selected?' pp-selected':''}">${idx+1}</span>`;
    }).join('');
    return `<div class="pp-adl-item"><span class="pp-adl-item-label">${esc(label)}</span><span class="pp-adl-nums">${numsHtml}</span></div>`;
  }).join('');
  return `<div class="pp-adl-row">${items}</div>`;
}

// ---- 不就労理由（ア〜オの記号付き選択肢、仕様書6章）。NOTWORK_REASON_MAPの文字を使い、
//      実物の5択（ア・イ・ウ・エ・オ）にUI側8択を縮約して表示する（出力ロジックと同じ縮約）。 ----
const NOTWORK_REASON_DISPLAY = [
  ['ア','体力に自信がなかったから'],
  ['イ','医師から働くことを止められていたから'],
  ['ウ','働く意欲がなかったから'],
  ['エ','働きたかったが適切な職場がなかったから'],
  ['オ','その他']
];
function renderPreviewReasonListHtml(selectedReasons, reasonOther){
  const selectedLetters = new Set((selectedReasons||[]).map(r=>NOTWORK_REASON_MAP[r]).filter(Boolean));
  const items = NOTWORK_REASON_DISPLAY.map(([letter,label])=>{
    const selected = selectedLetters.has(letter);
    let extra = '';
    if(letter==='オ' && selected){
      extra = reasonOther
        ? `（理由：${esc(reasonOther)}）`
        : '（理由：<span class="pp-blank">具体的な理由を記入してください</span>）';
    }
    return `<div class="pp-reason-item${selected?' pp-selected':''}"><span class="pp-reason-letter">${letter}</span>${esc(label)}${extra}</div>`;
  }).join('');
  return `<div class="pp-reason-list">${items}</div>`;
}

// ---- 就労・生活状況セクション（認定日頃／現在、共通レイアウト）のHTML。
//      仕様書6章：縦書きラベル列＋就労状況の記入枠＋不就労理由のチェック枠＋ADL選択枠＋自由記述枠。
//      注意：work.statusの値形式は呼び出し元によって異なる（既存実装の実態）。
//      ・現在欄（state.work）：'working'/'leave'/'not_working'（ch1_work_statusの3択、英語コード）
//        実際の分岐はexportToOfficialForm()・stepCh2Intro()と同じ「'working'なら就労側、
//        それ以外（'leave'も含む）は不就労側」の二択（3874行目 if(status==='working')...else...）。
//      ・認定日欄（snap.work）：'仕事をしていた'/'仕事をしていなかった'（stepCh5Recognitionの2択、日本語文字列）
//      この関数は両方から呼ばれるため、どちらの値形式でも正しく判定できるようにする。 ----
function renderPreviewWorkSectionHtml(work, notWorkReasons, adl, otherChips, otherNote, notWorkReasonOther){
  work = work || {};
  const isWorking = work.status === '仕事をしていた' || work.status === 'working';
  const isNotWorking = work.status === '仕事をしていなかった' || work.status === 'leave' || work.status === 'not_working';

  const jobTypeHtml = isWorking
    ? (work.jobType ? esc(work.jobType) : '<span class="pp-blank">職種（仕事の内容）を記入してください。</span>')
    : '<span class="pp-blank">職種（仕事の内容）を記入してください。</span>';
  const commuteMethodHtml = isWorking
    ? (toLabelStrings(work.commute).length ? esc(toLabelStrings(work.commute).join('・')) : '<span class="pp-blank">通勤方法を記入してください。</span>')
    : '<span class="pp-blank">通勤方法を記入してください。</span>';
  const commuteTimeHtml = isWorking
    ? (work.commuteTime ? `${esc(work.commuteTime)}（片道）` : '<span class="pp-blank">通勤時間（片道）</span>')
    : '<span class="pp-blank">通勤時間（片道）</span>';
  const workDaysHtml = isWorking
    ? (work.workDays ? `${esc(work.workDays)}日` : '<span class="pp-blank">出勤日数を記入してください。</span>')
    : '<span class="pp-blank">出勤日数を記入してください。</span>';
  const conditionHtml = isWorking
    ? (toLabelStrings(work.condition).length ? esc(toLabelStrings(work.condition).join('・')) : '<span class="pp-blank">仕事中や仕事が終わった時の身体の調子について記入してください。</span>')
    : '<span class="pp-blank">仕事中や仕事が終わった時の身体の調子について記入してください。</span>';
  const reasonListHtml = renderPreviewReasonListHtml(isNotWorking ? notWorkReasons : [], notWorkReasonOther);

  let otherText = toLabelStrings(otherChips||[]).join('・');
  if(otherNote){ otherText = otherText ? (otherText + '／' + otherNote) : otherNote; }
  const otherHtml = otherText ? esc(otherText) : '<span class="pp-blank">その他日常生活で不便に感じたことがありましたら記入してください。</span>';

  return `
    <div class="pp-block">
      <div class="pp-label">就労状況</div>
      <div class="pp-body">
        <div class="pp-row"><div class="pp-row-label">職種</div><div class="pp-row-value">${jobTypeHtml}</div></div>
        <div class="pp-row"><div class="pp-row-label">通勤方法</div><div class="pp-row-value">${commuteMethodHtml}</div></div>
        <div class="pp-row"><div class="pp-row-label">通勤時間</div><div class="pp-row-value">${commuteTimeHtml}</div></div>
        <div class="pp-row"><div class="pp-row-label">出勤日数</div><div class="pp-row-value">${workDaysHtml}</div></div>
        <div class="pp-row"><div class="pp-row-label">仕事中・終わった後の体の調子</div><div class="pp-row-value">${conditionHtml}</div></div>
        <div class="pp-row"><div class="pp-row-label">仕事をしていなかった理由</div><div class="pp-row-value">${reasonListHtml}</div></div>
      </div>
    </div>
    <div class="pp-block">
      <div class="pp-label">日常生活状況</div>
      <div class="pp-body">
        <div class="pp-row"><div class="pp-row-value">${renderPreviewAdlGridHtml(adl)}</div></div>
        <div class="pp-row"><div class="pp-row-label">その他</div><div class="pp-row-value">${otherHtml}</div></div>
      </div>
    </div>`;
}

// ---- 障害者手帳セクションのHTML（仕様書6章：種類チップは身・精・療・他の略字表現＋等級＋交付年月日＋障害名）。 ----

    return `<div class="pp-row"><div class="pp-row-label">交付状況</div><div class="pp-row-value"><span class="pp-blank">未入力（任意）</span></div></div>`;
  }
  const typeShortMap = {'身体障害者手帳':'身','精神障害者保健福祉手帳':'精','療育手帳':'療','その他':'他'};
  const typesHtml = ['身','精','療','他'].map(short=>{

    return `<span class="pp-notebook-type-opt${selected?' pp-selected':''}">${short}</span>`;
  }).join('');
  const dateHtml = (nb.acquiredKind && nb.acquiredKind!=='none' && nb.acquiredYear)

}

// ---- ch7_fragment_board：断片の追加・一覧・編集・削除。過去編の中心画面（Phase4仕様書3.2） ----
function renderPastFragmentList(){
  const listEl = document.getElementById('pastFragmentList');
  if(!listEl) return;
  // 新しい順（createdAt降順）。Phase4仕様書3.2.5。
  const sorted = [...state.pastFragments].sort((a,b)=> new Date(b.createdAt) - new Date(a.createdAt));
  if(sorted.length===0){
    listEl.innerHTML = '<p class="small">まだありません。下のフォームから置いてみてください。</p>';
    return;
  }
  listEl.innerHTML = sorted.map(f=>{
    const isExpanded = state.editingPastFragmentId === f.id;
    const bucketLabel = TIME_BUCKET_LABELS[f.timeBucket] || TIME_BUCKET_LABELS.unknown;
    const linkedHospital = f.linkedHospitalId ? state.pastHospitals.find(h=>h.hospitalId===f.linkedHospitalId) : null;
    if(!isExpanded){
      return `
        <div class="timeline-row" style="flex-direction:column;align-items:flex-start;" data-fragment-card="${f.id}">
          <span>${esc(f.text)}</span>
          <div class="small" style="margin-top:4px;">
            <span class="badge badge-neutral">${esc(bucketLabel)}</span>
            ${linkedHospital ? `<span class="badge badge-good">${esc(linkedHospital.name)}</span>` : ''}
          </div>
        </div>`;
    }
    // 展開時：編集フォーム（Phase4仕様書3.2.4）
    const hospitalOptions = state.pastHospitals.map(h=>
      `<option value="${esc(h.hospitalId)}" ${f.linkedHospitalId===h.hospitalId?'selected':''}>${esc(h.name)}</option>`
    ).join('');
    return `
      <div class="card" style="margin:10px 0;padding:14px;" data-fragment-card="${f.id}">
        <label class="field-label">内容</label>
        <textarea data-field="text" data-id="${f.id}">${esc(f.text)}</textarea>
        <label class="field-label">時期</label>
        <div class="chip-group" data-bucket-group="${f.id}"></div>
        <label class="field-label">時期の補足（任意）</label>
        <input type="text" data-field="timeDetail" data-id="${f.id}" value="${esc(f.timeDetail||'')}" placeholder="例：中学2年くらい" />
        <label class="field-label">状況の補足（任意）</label>
        <textarea data-field="memo" data-id="${f.id}" placeholder="状況や詳しい事情があれば">${esc(f.memo||'')}</textarea>
        <label class="field-label">病院とのリンク（任意）</label>
        <select data-field="linkedHospitalId" data-id="${f.id}">
          <option value="">リンクしない</option>
          ${hospitalOptions}
        </select>
        <div style="display:flex;gap:8px;margin-top:12px;">
          <button type="button" data-save-fragment="${f.id}" style="flex:1;padding:10px;border-radius:8px;border:none;background:var(--accent-strong);color:#fff;cursor:pointer;">編集を保存</button>
          <button type="button" data-delete-fragment="${f.id}" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--danger);background:var(--danger-soft);color:var(--danger);cursor:pointer;">削除</button>
        </div>
        <button type="button" class="link-btn" data-collapse-fragment="${f.id}" style="margin-top:8px;">閉じる</button>
      </div>`;
  }).join('');

  // 展開カードのbucketチップ・イベントをバインド
  sorted.forEach(f=>{
    if(state.editingPastFragmentId !== f.id) return;
    const groupId = `[data-bucket-group="${f.id}"]`;
    const groupEl = listEl.querySelector(groupId);
    if(groupEl){
      TIME_BUCKETS.forEach(b=>{
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'chip' + (f.timeBucket===b ? ' chip-selected' : '');
        btn.textContent = TIME_BUCKET_LABELS[b];
        btn.onclick = ()=>{
          updatePastFragment(f.id, {timeBucket:b});
          renderPastFragmentList();
        };
        groupEl.appendChild(btn);
      });
    }
  });

  // カード本体クリックで展開（編集中でないカードのみ）
  listEl.querySelectorAll('[data-fragment-card]').forEach(card=>{
    const id = card.getAttribute('data-fragment-card');
    if(state.editingPastFragmentId === id) return;
    card.style.cursor = 'pointer';
    card.onclick = ()=>{
      state.editingPastFragmentId = id;
      renderPastFragmentList();
    };
  });

  // 展開フォーム内の各フィールド
  listEl.querySelectorAll('[data-field="text"], [data-field="timeDetail"], [data-field="memo"]').forEach(el=>{
    el.onclick = e=>e.stopPropagation();
  });
  listEl.querySelectorAll('[data-field="linkedHospitalId"]').forEach(el=>{
    el.onclick = e=>e.stopPropagation();
  });
  listEl.querySelectorAll('[data-save-fragment]').forEach(btn=>{
    btn.onclick = e=>{
      e.stopPropagation();
      const id = btn.getAttribute('data-save-fragment');
      const card = listEl.querySelector(`[data-fragment-card="${id}"]`);
      const text = card.querySelector('[data-field="text"]').value;
      const timeDetail = card.querySelector('[data-field="timeDetail"]').value;
      const memo = card.querySelector('[data-field="memo"]').value;
      const linkedHospitalId = card.querySelector('[data-field="linkedHospitalId"]').value || undefined;
      const ok = updatePastFragment(id, {text, timeDetail: timeDetail||undefined, memo: memo||undefined, linkedHospitalId});
      if(ok){
        state.editingPastFragmentId = null;
        saveStateToStorage();
        renderPastFragmentList();
      }
    };
  });
  listEl.querySelectorAll('[data-delete-fragment]').forEach(btn=>{
    btn.onclick = e=>{
      e.stopPropagation();
      const id = btn.getAttribute('data-delete-fragment');
      // confirmあり（GPT方針：再現コストが高いため出来事カードより慎重に）
      const ok = confirm('この断片を削除します。よろしいですか？');
      if(!ok) return;
      deletePastFragment(id);
      if(state.editingPastFragmentId === id) state.editingPastFragmentId = null;
      saveStateToStorage();
      renderPastFragmentList();
    };
  });
  listEl.querySelectorAll('[data-collapse-fragment]').forEach(btn=>{
    btn.onclick = e=>{
      e.stopPropagation();
      state.editingPastFragmentId = null;
      renderPastFragmentList();
    };
  });
}

function stepCh7FragmentBoard(){
  document.getElementById('screen').innerHTML = `
    <div class="card">
      <h2>思い出したことを置く場所</h2>
      <p class="lead">短い言葉でも構いません。1つ置けたら、それで十分です。</p>
      <label class="field-label">思い出したこと</label>
      <textarea id="newFragmentText" placeholder="例：高校生のころ、よく休んでいた"></textarea>
      <p class="small" id="newFragmentError" style="color:var(--danger);margin:4px 0 0;display:none;">内容を入れてから「置く」を押してください。</p>
      <label class="field-label">時期（わからなければそのままでOK）</label>
      <div class="chip-group" id="newFragmentBucket"></div>
      <button type="button" id="addFragmentBtn" style="width:100%;padding:12px;border-radius:8px;border:none;background:var(--accent-strong);color:#fff;font-size:15px;cursor:pointer;margin-top:10px;">置く</button>

      <div class="edit-section" style="margin-top:18px;">
        <p class="edit-section-label">これまでに置いたもの</p>
        <div id="pastFragmentList"></div>
      </div>

      <div class="edit-section">
        <button type="button" id="goToPastHospitalBtn" style="width:100%;padding:12px;border-radius:8px;border:1px solid var(--accent-strong);background:#fff;color:var(--accent-strong);font-size:15px;cursor:pointer;">病院を追加する</button>
      </div>
    </div>`;

  let newBucket = 'unknown';
  const bucketGroup = document.getElementById('newFragmentBucket');
  TIME_BUCKETS.forEach(b=>{
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'chip' + (b==='unknown' ? ' chip-selected' : '');
    btn.textContent = TIME_BUCKET_LABELS[b];
    btn.onclick = ()=>{
      newBucket = b;
      bucketGroup.querySelectorAll('.chip').forEach(c=>c.classList.remove('chip-selected'));
      btn.classList.add('chip-selected');
    };
    bucketGroup.appendChild(btn);
  });

  renderPastFragmentList();
  // ch8_past_reviewから「詳細編集する」で来た場合、対象カードが展開済みで描画される。
  // 一覧の上の方に隠れている可能性があるため、該当カードへスクロールする。
  if(state.editingPastFragmentId){
    const targetCard = document.querySelector(`[data-fragment-card="${state.editingPastFragmentId}"]`);
    if(targetCard && typeof targetCard.scrollIntoView === 'function') targetCard.scrollIntoView({block:'center'});
  }

  const textEl = document.getElementById('newFragmentText');
  const errorEl = document.getElementById('newFragmentError');
  textEl.oninput = ()=>{ errorEl.style.display = 'none'; }; // 入力し始めたらエラー表示を消す
  document.getElementById('addFragmentBtn').onclick = ()=>{
    const text = textEl.value;
    if(!text || !text.trim()){
      errorEl.style.display = ''; // Phase4仕様書3.2.3：ボタン無効化ではなく軽いインライン警告
      return;
    }
    addPastFragment({text, timeBucket:newBucket});
    saveStateToStorage();
    textEl.value = '';
    errorEl.style.display = 'none';
    newBucket = 'unknown';
    bucketGroup.querySelectorAll('.chip').forEach(c=>c.classList.remove('chip-selected'));
    bucketGroup.firstChild.classList.add('chip-selected');
    renderPastFragmentList();
  };
  document.getElementById('goToPastHospitalBtn').onclick = ()=>goTo('ch7_hospital_add');

  setFooter({
    secondaryLabel:'戻る',
    secondaryFn:goBack,
    primaryLabel:'今日はここまでにする',
    primaryEnabled:true,
    primaryFn:()=>{
      // バリデーションなしで進める（Phase4仕様書3.2.8）。断片0件ならch5_done等へ戻る。
      if(state.pastFragments.length===0 && state.pastHospitals.length===0){
        const dest = state.returnTo || 'ch5_done';
        state.returnTo = null;
        goTo(dest);
      } else {
        goTo('ch8_past_review');
      }
    }
  });
}

// ---- ch7_hospital_add：過去病院カードの追加・編集・削除（Phase4仕様書3.3） ----
function renderPastHospitalList(){
  const listEl = document.getElementById('pastHospitalList');
  if(!listEl) return;
  if(state.pastHospitals.length===0){
    listEl.innerHTML = '<p class="small">まだ登録されていません。</p>';
    return;
  }
  listEl.innerHTML = state.pastHospitals.map(h=>{
    const isExpanded = state.editingPastHospitalId === h.hospitalId;
    if(!isExpanded){
      const fromLabel = h.from || '時期不明';
      const toLabel = h.ongoing ? '現在' : (h.to || '時期不明');
      return `
        <div class="timeline-row" data-hospital-card="${h.hospitalId}" style="cursor:pointer;">
          <span>${fromLabel}〜${toLabel}　${esc(h.name)}</span>
          ${badgeForPastConfidence(h.confidence)}
        </div>`;
    }
    return `
      <div class="card" style="margin:10px 0;padding:14px;" data-hospital-card="${h.hospitalId}">
        <label class="field-label">病院名</label>
        <input type="text" data-field="name" data-id="${h.hospitalId}" value="${esc(h.name)}" />
        <label class="field-label">いつから（任意・例：2015 または 2015-04）</label>
        <input type="text" data-field="from" data-id="${h.hospitalId}" value="${esc(h.from||'')}" placeholder="例：2015 または 2015-04" />
        <label class="field-label">いつまで（任意・例：2016 または 2016-03）</label>
        <input type="text" data-field="to" data-id="${h.hospitalId}" value="${esc(h.to||'')}" placeholder="例：2016 または 2016-03" ${h.ongoing?'disabled':''} />
        <div style="display:flex;align-items:center;gap:8px;margin-top:8px;">
          <input type="checkbox" data-field="ongoing" data-id="${h.hospitalId}" ${h.ongoing?'checked':''} style="width:18px;height:18px;" />
          <label class="small">今も通院している</label>
        </div>
        <label class="field-label">どのくらい確かですか</label>
        <div class="chip-group" data-conf-group="${h.hospitalId}"></div>
        <label class="field-label">状況の補足（任意）</label>
        <textarea data-field="memo" data-id="${h.hospitalId}" placeholder="転院した理由、診断のこと、通院の頻度など">${esc(h.memo||'')}</textarea>
        <div style="display:flex;gap:8px;margin-top:12px;">
          <button type="button" data-save-hospital="${h.hospitalId}" style="flex:1;padding:10px;border-radius:8px;border:none;background:var(--accent-strong);color:#fff;cursor:pointer;">更新する</button>
          <button type="button" data-delete-hospital="${h.hospitalId}" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--danger);background:var(--danger-soft);color:var(--danger);cursor:pointer;">削除する</button>
        </div>
        <button type="button" class="link-btn" data-collapse-hospital="${h.hospitalId}" style="margin-top:8px;">閉じる</button>
      </div>`;
  }).join('');

  state.pastHospitals.forEach(h=>{
    if(state.editingPastHospitalId !== h.hospitalId) return;
    const groupEl = listEl.querySelector(`[data-conf-group="${h.hospitalId}"]`);
    if(groupEl){
      PAST_HOSPITAL_CONFIDENCE.forEach(([key,label])=>{
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'chip' + (h.confidence===key ? ' chip-selected' : '');
        btn.textContent = label;
        btn.onclick = ()=>{
          groupEl.querySelectorAll('.chip').forEach(c=>c.classList.remove('chip-selected'));
          btn.classList.add('chip-selected');
          groupEl.setAttribute('data-selected-confidence', key);
        };
        groupEl.appendChild(btn);
      });
      groupEl.setAttribute('data-selected-confidence', h.confidence);
    }
    const ongoingEl = listEl.querySelector(`[data-hospital-card="${h.hospitalId}"] [data-field="ongoing"]`);
    const toEl = listEl.querySelector(`[data-hospital-card="${h.hospitalId}"] [data-field="to"]`);
    if(ongoingEl && toEl){
      ongoingEl.onchange = e=>{ toEl.disabled = e.target.checked; };
    }
  });

  listEl.querySelectorAll('[data-hospital-card]').forEach(card=>{
    const id = card.getAttribute('data-hospital-card');
    if(state.editingPastHospitalId === id) return;
    card.onclick = ()=>{
      state.editingPastHospitalId = id;
      renderPastHospitalList();
    };
  });
  listEl.querySelectorAll('input, textarea').forEach(el=>{ el.onclick = e=>e.stopPropagation(); });

  listEl.querySelectorAll('[data-save-hospital]').forEach(btn=>{
    btn.onclick = e=>{
      e.stopPropagation();
      const id = btn.getAttribute('data-save-hospital');
      const card = listEl.querySelector(`[data-hospital-card="${id}"]`);
      const name = card.querySelector('[data-field="name"]').value;
      const from = card.querySelector('[data-field="from"]').value;
      const to = card.querySelector('[data-field="to"]').value;
      const ongoing = card.querySelector('[data-field="ongoing"]').checked;
      const memo = card.querySelector('[data-field="memo"]').value;
      const confidence = card.querySelector('[data-conf-group]').getAttribute('data-selected-confidence');
      const ok = updatePastHospital(id, {
        name, from: from||undefined, to: ongoing?undefined:(to||undefined), ongoing, memo: memo||undefined, confidence
      });
      if(ok){
        state.editingPastHospitalId = null;
        saveStateToStorage();
        renderPastHospitalList();
        // 注：ch7_fragment_board側の断片一覧（リンク先病院名表示）は、
        // この画面のDOM上には存在しないため、ここでは更新できない。
        // ch7_fragment_boardへ戻った際にstepCh7FragmentBoard()が再実行され、
        // renderPastFragmentList()が呼ばれるため、戻った時点で最新の病院名が反映される。
      }
    };
  });
  listEl.querySelectorAll('[data-delete-hospital]').forEach(btn=>{
    btn.onclick = e=>{
      e.stopPropagation();
      const id = btn.getAttribute('data-delete-hospital');
      // confirmあり（GPT方針：過去病院削除もconfirmで揃える）
      const ok = confirm('この病院の記録を削除します。リンクしている断片のリンクも外れます。よろしいですか？');
      if(!ok) return;
      deletePastHospital(id);
      if(state.editingPastHospitalId === id) state.editingPastHospitalId = null;
      saveStateToStorage();
      renderPastHospitalList();
    };
  });
  listEl.querySelectorAll('[data-collapse-hospital]').forEach(btn=>{
    btn.onclick = e=>{
      e.stopPropagation();
      state.editingPastHospitalId = null;
      renderPastHospitalList();
    };
  });
}

function stepCh7HospitalAdd(){
  document.getElementById('screen').innerHTML = `
    <div class="card">

    const added = addPastHospital({
      name, from: from||undefined, to: ongoing?undefined:(to||undefined), ongoing, confidence:newConfidence, memo: memo||undefined

function renderPastReviewByBucket(){
  const containerEl = document.getElementById('pastReviewByBucket');
  if(!containerEl) return;
  containerEl.innerHTML = TIME_BUCKETS.map(bucket=>{
    const items = state.pastFragments.filter(f=>f.timeBucket===bucket);
    const label = TIME_BUCKET_LABELS[bucket];
    const itemsHtml = items.length
      ? items.map(f=>{
          const isExpanded = state.editingPastFragmentId === f.id;
          if(!isExpanded){
            return `<div class="timeline-row" data-review-fragment="${f.id}" style="cursor:pointer;"><span>${esc(f.text)}</span></div>`;
          }
          const hospitalOptions = state.pastHospitals.map(h=>
            `<option value="${esc(h.hospitalId)}" ${f.linkedHospitalId===h.hospitalId?'selected':''}>${esc(h.name)}</option>`
          ).join('');
          return `
            <div class="card" style="margin:8px 0;padding:12px;" data-review-fragment="${f.id}">
              <textarea data-field="text" data-id="${f.id}">${esc(f.text)}</textarea>
              <div class="chip-group" data-bucket-group="${f.id}" style="margin-top:6px;"></div>
              <select data-field="linkedHospitalId" data-id="${f.id}" style="margin-top:6px;">
                <option value="">リンクしない</option>
                ${hospitalOptions}
              </select>
              <div style="display:flex;gap:8px;margin-top:8px;">
                <button type="button" data-save-review-fragment="${f.id}" style="flex:1;padding:8px;border-radius:8px;border:none;background:var(--accent-strong);color:#fff;cursor:pointer;">保存</button>
                <button type="button" data-collapse-review-fragment="${f.id}" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--ink-soft);background:#fff;cursor:pointer;">閉じる</button>
              </div>
              <button type="button" class="link-btn" data-edit-detail-fragment="${f.id}" style="margin-top:6px;">時期の補足・状況のメモを編集する →</button>
            </div>`;
        }).join('')
      : '<p class="small" style="margin:4px 0 0;">まだありません</p>';
    return `<p class="edit-section-label" style="margin-top:14px;">${esc(label)}</p>${itemsHtml}`;
  }).join('');

  // bucketチップのバインド（展開中のカードのみ）
  state.pastFragments.forEach(f=>{
    if(state.editingPastFragmentId !== f.id) return;
    const groupEl = containerEl.querySelector(`[data-bucket-group="${f.id}"]`);
    if(groupEl){
      TIME_BUCKETS.forEach(b=>{
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'chip' + (f.timeBucket===b ? ' chip-selected' : '');
        btn.textContent = TIME_BUCKET_LABELS[b];
        btn.onclick = ()=>{
          updatePastFragment(f.id, {timeBucket:b});
          saveStateToStorage();
          renderPastReviewByBucket();
        };
        groupEl.appendChild(btn);
      });
    }
  });

  containerEl.querySelectorAll('[data-review-fragment]').forEach(card=>{
    const id = card.getAttribute('data-review-fragment');
    if(state.editingPastFragmentId === id) return;
    card.onclick = ()=>{
      state.editingPastFragmentId = id;
      renderPastReviewByBucket();
    };
  });
  containerEl.querySelectorAll('textarea, select').forEach(el=>{ el.onclick = e=>e.stopPropagation(); });
  containerEl.querySelectorAll('[data-save-review-fragment]').forEach(btn=>{
    btn.onclick = e=>{
      e.stopPropagation();
      const id = btn.getAttribute('data-save-review-fragment');
      const card = containerEl.querySelector(`[data-review-fragment="${id}"]`);
      const text = card.querySelector('[data-field="text"]').value;
      const linkedHospitalId = card.querySelector('[data-field="linkedHospitalId"]').value || undefined;
      const ok = updatePastFragment(id, {text, linkedHospitalId});
      if(ok){
        state.editingPastFragmentId = null;
        saveStateToStorage();
        renderPastReviewByBucket();
      }
    };
  });
  containerEl.querySelectorAll('[data-collapse-review-fragment]').forEach(btn=>{
    btn.onclick = e=>{
      e.stopPropagation();
      state.editingPastFragmentId = null;
      renderPastReviewByBucket();
    };
  });
  // 「時期の補足・状況のメモを編集する」：ch7_fragment_boardへ遷移し、対象断片を自動展開する。
  // ch8_past_reviewの責務はtimeBucket/リンク調整に留め、text/memo/timeDetailの詳細編集は
  // ch7_fragment_board側のフォームに一本化する（Phase4仕様書2.3：reviewは新規追加・詳細編集の主窓口にしない）。
  containerEl.querySelectorAll('[data-edit-detail-fragment]').forEach(btn=>{
    btn.onclick = e=>{
      e.stopPropagation();
      const id = btn.getAttribute('data-edit-detail-fragment');
      state.editingPastFragmentId = id;
      // goTo()は履歴スタックに積むため、ch7側の「戻る」(goBack)で自然にここへ戻れる
      goTo('ch7_fragment_board');
    };
  });
}

function stepCh5Edit(){
  const bands = buildAgeBands();
  let html = `<div class="card"><h2>出来事の配置を直す</h2><p class="lead">選んだ出来事の時期を、あとから変更できます。</p>`;
  state.selectedEvents.forEach(ev=>{

  });
  html += '</div>';
  document.getElementById('screen').innerHTML = html;

  state.selectedEvents.forEach(ev=>{
    const key = ev.id;
    const options = bands.map(b=>b.label).concat(['わからない']);
    const current = state.eventPlacements[key];
    const currentLabel = current==='unknown' ? 'わからない' : (current && typeof current==='object' ? bands[current.bandIndex].label : null);
    renderChipGroup('edit_'+key, options, currentLabel ? [currentLabel] : [], false, v=>{
      if(v==='わからない'){
        state.eventPlacements[key] = 'unknown';
      } else {
        const idx = bands.findIndex(b=>b.label===v);
        if(idx>=0) state.eventPlacements[key] = {bandIndex:idx};
      }
    });
  });

  setFooter({secondaryLabel:'戻る', secondaryFn:goBack, primaryLabel:'年表に戻る', primaryEnabled:true, primaryFn:()=>goTo('ch5_done')});
}

  workDaysEl.oninput = e=>snap.work.workDays = e.target.value;
  renderChipGroup('recogCommuteChips', COMMUTE_METHOD, snap.work.commute, true, ()=>{});
  renderChipGroup('recogCommuteTimeChips', COMMUTE_TIME, snap.work.commuteTime ? [snap.work.commuteTime] : [], false, v=>{ snap.work.commuteTime = v; });
  renderChipGroup('recogConditionChips', WORK_CONDITION, snap.work.condition, true, ()=>{});
  renderStringCheckList('recogReasonList', NOTWORK_REASONS.map(l=>[l,l]), snap.notWorkReasons, NOTWORK_REASON_HELP_TEXTS, (key)=>{
    if(key==='その他'){
      document.getElementById('recogReasonOtherBlock').style.display = snap.notWorkReasons.includes('その他') ? '' : 'none';
    }
  });
  const recogReasonOtherEl = document.getElementById('recogReasonOtherText');
  recogReasonOtherEl.value = snap.notWorkReasonOther;
  recogReasonOtherEl.oninput = e=>snap.notWorkReasonOther = e.target.value;

  const workingBlock = document.getElementById('recogWorkingBlock');
  const notWorkingBlock = document.getElementById('recogNotWorkingBlock');
  // ===== 就労状態（仕事をしていた／していなかった）の仕様 =====
  // 「仕事をしていた」「仕事をしていなかった」は排他的な入力である（同時に両方を満たすことはない）。
  // そのため、ステータスを切り替えたときは反対側ブロックに残っていた入力を必ずクリアする。
  // 理由：認定日欄の出力（writeRecognitionSnapshotToBack）は「就労していた情報」と
  // 「就労していなかった理由」を同時に書き込めてしまう実装になりうるため、片方の選択を
  // 解除した時点で反対側のデータをstateから消しておかないと、申立書上で
  // 「就労していた（職種あり）」と「不就労理由あり」が同時に出力される矛盾が起きる。
  // クリアはUI側（本関数群）と出力側（writeRecognitionSnapshotToBack内のstatusガード）の
  // 二重で行っている。UI側のクリアだけでは古い保存データ（state直接編集や将来の不整合）に
  // 弱く、出力側ガードだけでは画面上に「消えたはずの古い入力」が残って見える表示矛盾が残るため。
  //
  // renderChipGroupはラベル文字列そのものを値として扱う仕様（[key,label]ペアではなく文字列配列を渡す）。
  // 内部判定もラベル文字列そのもの（'仕事をしていた'）で行う。
  // 未選択(null)時は両ブロックとも非表示にする（以前は否定判定により、未選択でも
  // notWorkingBlockが表示されてしまっていたバグがあった。B-3で修正済み）。
  function syncWorkStatusBlocks(){
    workingBlock.style.display = snap.work.status==='仕事をしていた' ? '' : 'none';
    notWorkingBlock.style.display = snap.work.status==='仕事をしていなかった' ? '' : 'none';
  }
  // 反対側ブロックのデータをクリアする実処理。呼び出しはステータス変更時（下のrenderChipGroupの
  // onToggle）のみで、画面初期表示時には呼ばない（既存データを誤って消さないため）。
  function clearWorkSideData(){
    snap.work.jobType = '';
    snap.work.commute = [];
    snap.work.commuteTime = null;
    snap.work.workDays = '';
    snap.work.condition = [];
  }
  function clearNotWorkingSideData(){
    snap.notWorkReasons = [];
  }
  renderChipGroup('recogStatusChips', ['仕事をしていた','仕事をしていなかった'], snap.work.status ? [snap.work.status] : [], false, v=>{
    const previous = snap.work.status;
    snap.work.status = v;
    if(v!==previous){
      if(v==='仕事をしていた') clearNotWorkingSideData();
      else if(v==='仕事をしていなかった') clearWorkSideData();
    }
    showScreen(); // クリアした内容を画面にも反映するため再描画する（input/chipの表示が古い値のまま残らないようにする）
  });
  syncWorkStatusBlocks();

  document.getElementById('disableRecognitionBtn').onclick = disableRecognitionInput;

  setFooter({secondaryLabel:'戻る', secondaryFn:()=>{
    const dest = state.returnTo || 'ch5_done';
    goTo(dest);
  }, primaryLabel:'次へ', primaryEnabled:true, primaryFn:()=>goTo('ch5_recognition_adl')});
}

// ---- ch5_recognition_adl：障害認定日頃の日常生活の入力（任意・2画面目）。02裏面19-30行目に対応。
//      就労状況（stepCh5Recognition）とは別画面に分離（情報過多を避けるため）。 ----
function stepCh5RecognitionAdl(){
  const snap = state.recognitionSnapshot;

  document.getElementById('screen').innerHTML = `
    <div class="card">
      <h2>障害認定日ごろの日常生活について（任意）</h2>
      <p class="lead" style="font-weight:600;color:var(--accent-strong);">${esc(RECOGNITION_PERIOD_NOTICE_MAIN)}</p>
      <p class="small" style="margin-bottom:4px;color:var(--accent-strong);">${esc(RECOGNITION_PERIOD_NOTICE_SHORT)}</p>
      <p class="small hint" style="margin-bottom:10px;">${esc(ADL_HELP_NOTICE)}</p>
      <div id="recogAdlList"></div>

      <button type="button" id="disableRecognitionBtn" style="width:100%;margin-top:18px;padding:10px;border-radius:8px;border:1px solid var(--danger);background:var(--danger-soft);color:var(--danger);font-size:14px;cursor:pointer;">この入力を取りやめて空欄に戻す</button>

      <p class="small" style="margin-top:14px;text-align:center;">入力した内容は自動的に保存されます。そのまま戻っても消えません。</p>
    </div>`;

  let adlHtml = '';
  ADL_ITEMS.forEach(([key,label])=>{
    adlHtml += renderAdlItemHtml(key, label, 'recogAdl_');
  });
  document.getElementById('recogAdlList').innerHTML = adlHtml;
  ADL_ITEMS.forEach(([key])=>{
    const container = document.getElementById('recogAdl_'+key);
    ADL_LEVELS.forEach(levelLabel=>{
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'chip' + (snap.adl[key]===levelLabel ? ' chip-selected' : '');
      btn.textContent = levelLabel;
      btn.onclick = ()=>{
        snap.adl[key] = levelLabel;
        container.querySelectorAll('.chip').forEach(c=>c.classList.remove('chip-selected'));
        btn.classList.add('chip-selected');
      };
      container.appendChild(btn);
    });
  });

  document.getElementById('disableRecognitionBtn').onclick = disableRecognitionInput;

  setFooter({secondaryLabel:'戻る', secondaryFn:()=>goTo('ch5_recognition'), primaryLabel:'次へ', primaryEnabled:true, primaryFn:()=>goTo('ch5_recognition_other')});
}

// ---- ch5_recognition_other：障害認定日頃の「その他」生活の困りごと（任意・3画面目）。
//      現在欄のch2_adl→ch2_otherと同じ構成に合わせ、ADL画面（stepCh5RecognitionAdl）とは
//      別画面に分離（2026-07-01対応）。 ----
function stepCh5RecognitionOther(){
  const snap = state.recognitionSnapshot;

  document.getElementById('screen').innerHTML = `
    <div class="card">
      <h2>その他、認定日ごろの生活で困っていたことは？</h2>
      <div id="recogOtherList"></div>
      <label class="field-label">補足（任意）</label>
      <textarea id="recogOtherNote" placeholder="${esc(OTHER_NOTE_PLACEHOLDER)}"></textarea>
      ${renderHelpListHtml(OTHER_NOTE_HELP_ITEMS)}

      <button type="button" id="disableRecognitionBtn" style="width:100%;margin-top:18px;padding:10px;border-radius:8px;border:1px solid var(--danger);background:var(--danger-soft);color:var(--danger);font-size:14px;cursor:pointer;">この入力を取りやめて空欄に戻す</button>

      <p class="small" style="margin-top:14px;text-align:center;">入力した内容は自動的に保存されます。そのまま戻っても消えません。</p>
    </div>`;

  renderStringCheckList('recogOtherList', OTHER_DIFFICULTIES.map(l=>[l,l]), snap.otherChips);

  const otherNoteEl = document.getElementById('recogOtherNote');
  otherNoteEl.value = snap.otherNote;
  otherNoteEl.oninput = e=>snap.otherNote = e.target.value;

  document.getElementById('disableRecognitionBtn').onclick = disableRecognitionInput;

  setFooter({secondaryLabel:'戻る', secondaryFn:()=>goTo('ch5_recognition_adl'), primaryLabel:'完了', primaryEnabled:true, primaryFn:()=>{
    const dest = state.returnTo || 'ch5_done';
    goTo(dest);
  }});
}

// ---- ch5_notebook：障害者手帳の情報の入力（任意）。02裏面58-65行目（1件目枠）に対応 ----
const DISABILITY_NOTEBOOK_TYPES = ['身体障害者手帳','精神障害者保健福祉手帳','療育手帳','その他'];

function stepCh5Notebook(){
  const nb = state.disabilityNotebook;
  const enabled = nb.enabled;

  if(!enabled){
    document.getElementById('screen').innerHTML = `
      <div class="card">
        <h2>障害者手帳の情報（任意）</h2>
        <p class="lead">障害者手帳を持っている場合、その内容を申立書に反映できます。持っていない場合は入力不要です。</p>
        <button type="button" id="enableNotebookBtn" style="width:100%;padding:12px;border-radius:8px;border:none;background:var(--accent-strong);color:#fff;font-size:15px;cursor:pointer;">入力する</button>
      </div>`;
    document.getElementById('enableNotebookBtn').onclick = ()=>{
      nb.enabled = true;
      showScreen();
    };
    setFooter({secondaryLabel:'戻る', secondaryFn:()=>{
      const dest = state.returnTo || 'ch5_done';
      goTo(dest);
    }});
    return;
  }

  document.getElementById('screen').innerHTML = `
    <div class="card">
      <h2>障害者手帳の情報（任意）</h2>
      <label class="field-label">手帳の種類</label>
      <div class="chip-group" id="notebookTypeChips"></div>
      <div id="notebookOtherTypeBlock" style="display:none;">
        <label class="field-label">手帳の種類（その他の場合、名称を入力）</label>
        <input type="text" id="notebookOtherTypeName" />
      </div>
      <label class="field-label">等級</label>
      <input type="text" id="notebookGrade" placeholder="例：2級" />
      <label class="field-label">取得年月（任意。わかる範囲でOK）</label>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="number" id="notebookYear" placeholder="年（西暦）" style="flex:1;" />
        <input type="number" id="notebookMonth" min="1" max="12" placeholder="月" style="flex:1;" />
        <input type="number" id="notebookDay" min="1" max="31" placeholder="日（任意）" style="flex:1;" />
      </div>
      <label class="field-label">障害名・補足（任意）</label>
      <textarea id="notebookDisabilityName"></textarea>

      <button type="button" id="disableNotebookBtn" style="width:100%;margin-top:18px;padding:10px;border-radius:8px;border:1px solid var(--danger);background:var(--danger-soft);color:var(--danger);font-size:14px;cursor:pointer;">この入力を取りやめて空欄に戻す</button>

      <p class="small" style="margin-top:14px;text-align:center;">入力した内容は自動的に保存されます。そのまま戻っても消えません。</p>
    </div>`;

  const otherTypeBlock = document.getElementById('notebookOtherTypeBlock');
  function syncOtherTypeBlock(){
    otherTypeBlock.style.display = nb.type==='その他' ? '' : 'none';
  }
  // renderChipGroupは単純な文字列配列を値として扱う仕様（[key,label]ペアではない）。
  // DISABILITY_NOTEBOOK_TYPES自体が文字列配列なのでそのまま渡す
  // （以前は.map(t=>[t,t])で変換していたが、これがnb.typeに配列を代入してしまうバグの原因だった。
  //   表示が「身体障害者手帳,身体障害者手帳」のように壊れる・選択状態が再表示時に外れる・
  //   Excel出力でレ点が入らない、の3つの症状はすべてこの1つの原因による）
  renderChipGroup('notebookTypeChips', DISABILITY_NOTEBOOK_TYPES, nb.type ? [nb.type] : [], false, v=>{
    nb.type = v;
    syncOtherTypeBlock();
  });
  syncOtherTypeBlock();

  const otherTypeNameEl = document.getElementById('notebookOtherTypeName');
  otherTypeNameEl.value = nb.otherTypeName;
  otherTypeNameEl.oninput = e=>nb.otherTypeName = e.target.value;

  const gradeEl = document.getElementById('notebookGrade');
  gradeEl.value = nb.grade;
  gradeEl.oninput = e=>nb.grade = e.target.value;

  const yearEl = document.getElementById('notebookYear');
  const monthEl = document.getElementById('notebookMonth');
  const dayEl = document.getElementById('notebookDay');
  yearEl.value = nb.acquiredYear;
  monthEl.value = nb.acquiredMonth;
  dayEl.value = nb.acquiredDay;
  // acquiredKindは出力時に「年だけ／年月／年月日／未入力」のどこまで埋まっているかを判定するために使う。
  // 入力欄が3つの独立inputのため、入力都度ここで再判定する（既存のfromKind/toKind方式に揃える）。
  function syncAcquiredKind(){
    nb.acquiredYear = yearEl.value;
    nb.acquiredMonth = monthEl.value;
    nb.acquiredDay = dayEl.value;
    if(!nb.acquiredYear){ nb.acquiredKind = 'none'; }
    else if(!nb.acquiredMonth){ nb.acquiredKind = 'y'; }
    else if(!nb.acquiredDay){ nb.acquiredKind = 'ym'; }
    else { nb.acquiredKind = 'ymd'; }
  }
  yearEl.oninput = syncAcquiredKind;
  monthEl.oninput = syncAcquiredKind;
  dayEl.oninput = syncAcquiredKind;

  const disabilityNameEl = document.getElementById('notebookDisabilityName');
  disabilityNameEl.value = nb.disabilityName;
  disabilityNameEl.oninput = e=>nb.disabilityName = e.target.value;

  document.getElementById('disableNotebookBtn').onclick = ()=>{
    const ok = confirm('入力した内容を消して、障害者手帳の情報を未入力（空欄で出力）に戻します。よろしいですか？');
    if(!ok) return;
    nb.enabled = false;
    nb.type = ''; nb.otherTypeName = ''; nb.grade = '';
    nb.acquiredKind = 'none'; nb.acquiredYear = ''; nb.acquiredMonth = ''; nb.acquiredDay = '';
    nb.disabilityName = ''; nb.note = '';
    showScreen();
  };

  setFooter({secondaryLabel:'戻る', secondaryFn:()=>{
    const dest = state.returnTo || 'ch5_done';
    goTo(dest);
  }});
}

  start: stepStart,
  profile_birth: stepProfileBirth,

  ch4_period: stepCh4Period,
  ch4_confidence: stepCh4Confidence,

  ch5_intro: stepCh5Intro,

  ch5_done: stepCh5Done,
  ch5_preview: stepCh5Preview,
  ch5_edit: stepCh5Edit,
  ch5_recognition: stepCh5Recognition,
  ch5_recognition_adl: stepCh5RecognitionAdl,
  ch5_recognition_other: stepCh5RecognitionOther,
  ch5_notebook: stepCh5Notebook,
  ch2_intro: stepCh2Intro,
  ch2_work_detail: stepCh2WorkDetail,
  ch2_notwork_reason: stepCh2NotworkReason,
  ch2_adl: stepCh2Adl,
  ch2_other: stepCh2Other,
  // 過去編（続紙対応）。Step2でUI骨格・CRUDまで実装。
  ch6_past_intro: stepCh6PastIntro,
  ch7_fragment_board: stepCh7FragmentBoard,
  ch7_hospital_add: stepCh7HospitalAdd,
  ch8_past_review: stepCh8PastReview
};

function showScreen(){
  document.getElementById('taskHeader').style.display = '';
  renderTasks();
  STEPS[current]();
}

resetState();
current = 'start';
const savedPayload = loadStateFromStorage();
if(savedPayload){
  document.getElementById('taskHeader').style.display = 'none';
  stepResumeCheck(savedPayload);
} else {
  showScreen();
}
</script>
