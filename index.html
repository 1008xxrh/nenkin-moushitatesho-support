
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>申立書サポート（試作・第1〜5章）</title>
<style>
:root{
  --bg:#F4F2EC;
  --card:#FFFFFF;
  --ink:#2B2B28;
  --ink-soft:#6B6B63;
  --line:#E2DDD0;
  --accent:#4F7A6B;
  --accent-soft:#E4EDE8;
  --accent-strong:#345A4C;
  --warn:#B8742E;
  --warn-soft:#F6E8D8;
  --danger:#A3402F;
  --danger-soft:#F5E1DB;
  --good:#3E7D4C;
  --good-soft:#E3F0E3;
  --neutral-soft:#EFEBE2;
}
*{box-sizing:border-box;}
body{
  margin:0;background:var(--bg);
  font-family:"Hiragino Sans","Noto Sans JP",system-ui,-apple-system,sans-serif;
  color:var(--ink);line-height:1.7;
}
#app-shell{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
header.tasks{padding:16px 20px 4px;}
.task-list{display:flex;gap:6px;margin-top:8px;}
.task-pill{flex:1;text-align:center;font-size:11px;padding:6px 4px;border-radius:8px;background:var(--card);border:1px solid var(--line);color:var(--ink-soft);}
.task-pill.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-strong);font-weight:500;}
.task-pill.done{color:var(--good);}
main{flex:1;padding:8px 20px 24px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px 20px;}
h1{font-size:20px;font-weight:500;margin:0 0 8px;}
h2{font-size:17px;font-weight:500;margin:0 0 12px;}
.card-name-label{font-size:13px;color:var(--ink-soft);margin:0 0 4px;}
.card-name-big{font-size:24px;font-weight:500;color:var(--accent-strong);margin:0 0 4px;line-height:1.4;}
.card-name-sub{font-size:14px;color:var(--ink-soft);margin:0 0 20px;}
p.lead{color:var(--ink-soft);font-size:14px;margin:0 0 20px;}
.hint{background:var(--accent-soft);color:var(--accent-strong);font-size:13px;padding:10px 14px;border-radius:10px;margin:12px 0;}
.chip-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.chip{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:8px 14px;font-size:14px;color:var(--ink);cursor:pointer;}
.chip-selected{background:var(--accent);border-color:var(--accent);color:#fff;}
.option-block{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.option{border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-size:15px;cursor:pointer;background:var(--card);}
.option.selected{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-strong);font-weight:500;}
label.field-label{display:block;font-size:13px;color:var(--ink-soft);margin:16px 0 6px;}
input[type=text],input[type=number]{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#fff;color:var(--ink);}
textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;min-height:80px;font-family:inherit;}
.row{display:flex;gap:10px;}
.row > *{flex:1;}
.adl-item{margin-bottom:18px;}
.adl-label{font-size:14px;margin-bottom:8px;}
.adl-options .chip{font-size:12px;padding:7px 10px;}
.check-row{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;}
.check-box{width:18px;height:18px;border:1px solid var(--line);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;}
.check-box.on{background:var(--accent);}
.check-box span{color:#fff;font-size:12px;}
.footer-nav{position:sticky;bottom:0;background:linear-gradient(to top, var(--bg) 75%, transparent);padding:16px 20px 20px;display:flex;gap:10px;max-width:480px;margin:0 auto;width:100%;}
button.btn{flex:1;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:500;cursor:pointer;}
button.btn-primary{background:var(--accent);color:#fff;}
button.btn-primary:disabled{background:#C9C4B6;cursor:not-allowed;}
button.btn-secondary{background:var(--card);border:1px solid var(--line);color:var(--ink);}
.timeline-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px;}
.timeline-row.gap{color:var(--ink-soft);border-bottom:1px dashed var(--line);font-style:italic;}
.badge{font-size:12px;padding:3px 10px;border-radius:999px;white-space:nowrap;}
.badge-good{background:var(--good-soft);color:var(--good);}
.badge-warn{background:var(--warn-soft);color:var(--warn);}
.badge-danger{background:var(--danger-soft);color:var(--danger);}
.badge-neutral{background:var(--neutral-soft);color:var(--ink-soft);}
.center{text-align:center;}
.small{font-size:13px;color:var(--ink-soft);}
.link-btn{background:none;border:none;color:var(--accent-strong);font-size:14px;text-decoration:underline;cursor:pointer;padding:0;display:block;margin-top:4px;}
button:focus-visible, .option:focus-visible, .chip:focus-visible, [role="button"]:focus-visible{outline:2px solid var(--accent-strong);outline-offset:2px;}
.edit-section{margin-top:24px;padding-top:16px;border-top:1px solid var(--border);}
.edit-section-label{font-size:12px;color:var(--ink-soft);margin:0 0 10px;}
.edit-section-grid{display:flex;flex-wrap:wrap;gap:8px;}
.edit-chip{background:var(--surface-raised);border:1px solid var(--border);border-radius:999px;font-size:13px;padding:6px 14px;cursor:pointer;color:var(--ink);}
.repeat-block{border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.repeat-block-head{display:flex;align-items:center;justify-content:space-between;}
.repeat-block-title{font-size:15px;}
.repeat-add{background:none;border:1px solid var(--accent-strong);color:var(--accent-strong);border-radius:999px;font-size:13px;padding:4px 12px;cursor:pointer;}
.repeat-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding:8px 10px;background:var(--surface-raised);border-radius:8px;font-size:14px;}
.repeat-remove{background:none;border:none;color:var(--danger);font-size:13px;cursor:pointer;text-decoration:underline;padding:0;}

/* ---- アコーディオン（ch5_done仕様書3.6） ---- */
.accordion-group{border-top:1px solid var(--border);}
.accordion-item{border-bottom:1px solid var(--border);}
.accordion-trigger{width:100%;text-align:left;background:none;border:none;padding:12px 4px;font-size:14px;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
.accordion-trigger::after{content:'▼';font-size:10px;color:var(--ink-soft);transition:transform 0.15s;}
.accordion-trigger-open::after{transform:rotate(180deg);}
.accordion-panel{padding:0 4px 14px;}

/* ---- ch5_preview：紙を模した1枚の申立書（ch5_preview仕様書3章） ---- */
.preview-status{background:var(--surface-raised);border-radius:10px;padding:12px 14px;margin-bottom:14px;}
.preview-status-title{font-size:13px;font-weight:600;margin:0 0 8px;}
.preview-status-counts{display:flex;gap:14px;font-size:12px;margin-bottom:10px;}
.preview-status-counts span{display:flex;align-items:center;gap:4px;}
.preview-status-list{display:flex;flex-wrap:wrap;gap:8px;font-size:12px;border-top:1px solid var(--border);padding-top:10px;margin-bottom:8px;}
.preview-status-list button{background:none;border:none;padding:0;font-size:12px;cursor:pointer;color:var(--ink);}
.preview-status-excluded{font-size:11px;color:var(--ink-soft);border-top:1px solid var(--border);padding-top:8px;}

/* ---- ch5_preview v4：紙そのもの（02.xlsx様式の升目構造再現、仕様書2章） ---- */
.preview-paper{background:#fff;color:#1a1a1a;border:1px solid #888;font-size:12px;line-height:1.5;}
.preview-paper-title{text-align:center;padding:14px 10px 10px;border-bottom:3px double #1a1a1a;font-size:16px;font-weight:700;letter-spacing:0.05em;}
/* 章タイトル行（実物02.xlsx裏面A4「１．障害認定日」／A32「２．現在…」に対応）。
   一度は罫線を完全に削除したが、紙面の区切りが読み取りにくくなった（2026-06-30レビューで
   「前の方がよかった」との指摘）ため、罫線ありの状態に戻す。実物の罫線は厳密にはタイトル
   行自身ではなくその前後の行にあるが、画面上は視覚的な区切りを優先しタイトル行に
   border-top/border-bottomを持たせる。直前要素のborder-bottomと隣接すると二重線に見える
   ため、margin-topで1pxずらして1本の太線に見せる。
   注意：「１．障害認定日」「２．現在…」の各章タイトルは、preview-sec-recognition／
   preview-sec-currentという別々のラッパーdivの中に1個ずつ置かれている。そのため
   :first-of-typeを使うと、両方とも「自分の親の中では最初」と判定されて両方に
   マッチしてしまい、本来「現在」章に出るべき上罫線まで消えてしまう不具合が過去にあった
   （2026-07-02発覚）。以後、罫線を消したいのはページ全体で最初の章タイトルだけなので、
   :first-of-typeではなく明示的なクラス(.pp-chapter-title-first)で個別に指定すること。 */
.pp-chapter-title{padding:10px 10px 6px;font-size:13px;font-weight:700;background:#fff;border-top:2px solid #1a1a1a;border-bottom:1px solid #888;margin-top:-1px;}
.pp-chapter-title.pp-chapter-title-first{border-top:none;margin-top:0;}
.pp-block{display:flex;border-bottom:1px solid #888;}
.pp-label{width:30px;flex-shrink:0;background:#f4f4f2;border-right:1px solid #888;writing-mode:vertical-rl;text-align:center;font-size:12px;font-weight:600;padding:10px 0;font-family:'Noto Sans CJK JP','Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif;}
.pp-body{flex:1;min-width:0;}
.pp-row{display:flex;border-bottom:1px solid #ccc;}
.pp-row:last-child{border-bottom:none;}
.pp-row-label{width:74px;flex-shrink:0;padding:7px 6px;font-size:11px;color:#444;border-right:1px solid #ccc;background:#fafafa;}
.pp-row-value{flex:1;min-width:0;padding:7px 8px;font-size:12px;}
.pp-blank{color:#aaa;}
.pp-unavailable{color:#aaa;font-style:normal;}

/* 傷病名・発病日・初診日（升目だが恒久的に未入力） */
.pp-static-row{display:flex;border-bottom:1px solid #888;}
.pp-static-label{width:74px;flex-shrink:0;padding:9px 6px;font-size:11px;font-weight:600;background:#f4f4f2;border-right:1px solid #888;}
.pp-static-value{flex:1;padding:9px 8px;font-size:12px;}

/* 元号セレクタ風表示（実物のプレースホルダー文言を再現） */
.pp-era{display:inline-flex;gap:2px;}
.pp-era-opt{border:1px solid #999;border-radius:2px;padding:1px 5px;font-size:10px;color:#999;}
.pp-era-opt.pp-selected{border-color:#1a1a1a;color:#1a1a1a;font-weight:700;background:#eee;}
.pp-date-placeholder{color:#999;font-size:11px;}

/* チェックボックス（□にレ点） */
.pp-checkbox{display:inline-flex;align-items:center;gap:3px;margin-right:14px;font-size:12px;}
.pp-checkbox-box{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border:1px solid #1a1a1a;font-size:11px;font-weight:700;flex-shrink:0;}
.pp-checkbox.pp-checked .pp-checkbox-box{background:#1a1a1a;color:#fff;}
.pp-checkbox:not(.pp-checked) .pp-checkbox-box{color:transparent;}

/* ADL選択枠（丸数字） */
.pp-adl-row{display:flex;flex-wrap:wrap;gap:6px 16px;}
.pp-adl-item{display:flex;align-items:center;gap:4px;font-size:11px;white-space:nowrap;}
.pp-adl-item-label{min-width:32px;}
.pp-adl-nums{display:inline-flex;gap:3px;}
.pp-adl-num{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;font-size:10px;color:#999;border:1px solid transparent;}
.pp-adl-num.pp-selected{border:1.5px solid #1a1a1a;color:#1a1a1a;font-weight:700;}

/* 不就労理由（ア〜オの記号付き選択肢） */
.pp-reason-list{display:flex;flex-direction:column;gap:3px;}
.pp-reason-item{display:flex;gap:5px;font-size:11px;}
.pp-reason-item.pp-selected{font-weight:700;}
.pp-reason-letter{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border:1px solid #999;border-radius:50%;font-size:9px;flex-shrink:0;}
.pp-reason-item.pp-selected .pp-reason-letter{border-color:#1a1a1a;background:#1a1a1a;color:#fff;}
.pp-reason-item:not(.pp-selected){color:#999;}

/* 年表（マス目、1〜5+の番号付き行） */
.pp-period-row{display:flex;border-bottom:1px solid #888;}
.pp-period-num{width:26px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;border-right:1px solid #888;background:#f4f4f2;}
.pp-period-body{flex:1;min-width:0;display:flex;}
.pp-period-dates{width:140px;flex-shrink:0;padding:6px;font-size:10px;line-height:1.6;border-right:1px solid #ccc;}
.pp-period-note{flex:1;min-width:0;padding:6px 8px;font-size:11px;line-height:1.5;}
.pp-period-hospital{font-weight:600;font-size:11px;margin-bottom:2px;}

/* 手帳：種類チップ（身・精・療・他の略字表現） */
.pp-notebook-types{display:inline-flex;gap:3px;font-size:10px;}
.pp-notebook-type-opt{border:1px solid #999;border-radius:2px;padding:1px 4px;color:#999;}
.pp-notebook-type-opt.pp-selected{border-color:#1a1a1a;color:#1a1a1a;font-weight:700;background:#eee;}

.preview-output-note{font-size:11px;color:var(--ink-soft);text-align:center;margin-top:8px;}
.preview-jump{background:none;border:none;padding:0;font-size:12px;cursor:pointer;color:var(--ink);}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
</head>

// ---- 西暦→和暦変換（簡易版） ----
function yearToWareki(year){
  if(year===null || year===undefined || isNaN(year)) return [null, null];
  if(year >= 2019) return ['令和', year - 2018];
  if(year >= 1989) return ['平成', year - 1988];
  if(year >= 1926) return ['昭和', year - 1925];
  return [null, null];
}

// ---- 様式記入時点（出力ボタンを押した「今日」） ----
function getFormFillDate(){
  const now = new Date();
  return {year: now.getFullYear(), month: now.getMonth()+1, day: now.getDate()};
}

// ---- 出来事カードの年範囲（年齢帯→年）を作る。状況欄の参考情報用 ----
function buildEventYearRanges(){
  const bands = buildAgeBands();
  const ranges = [];
  state.selectedEvents.forEach(ev=>{
    const placement = state.eventPlacements[ev.id];
    if(!placement || placement==='unknown') return;
    const band = bands[placement.bandIndex];
    if(!band) return;
    ranges.push({startYear:band.startYear, endYear:band.endYear, label:ev.label});
  });
  return ranges;
}

// ---- 通院記録＋通院空白を様式の「期間」配列に変換（最大5件、6件目以降は今回未対応） ----
function buildPeriodsForForm(){
  const eventRanges = buildEventYearRanges();
  const periods = [];

  state.hospitals.forEach(h=>{
    const fromY = parseInt(h.fromYear) || null;
    const fromM = parseInt(h.fromMonth) || null;
    let toY, toM, toIsNow = false;
    if(h.ongoing){
      const fillDate = getFormFillDate();
      toY = fillDate.year; toM = fillDate.month; toIsNow = true;
    } else {
      toY = parseInt(h.toYear) || null;
      toM = parseInt(h.toMonth) || null;
    }
    const related = eventRanges.filter(r => fromY && r.startYear <= fromY && fromY <= r.endYear).map(r=>r.label);
    const hospitalName = h.nameUnknown ? '' : (h.name || '');
    const noteParts = [];
    noteParts.push(`${h.hospitalType || ''}${hospitalName || '（病院名不明）'}に通院。`);
    if(toIsNow) noteParts.push('現在も通院中。');
    if(related.length) noteParts.push('この頃の出来事：' + related.join('・') + '。');
    periods.push({
      sortKey: fromY || 0,
      fromY, fromM, toY, toM, toIsNow,
      visited: true,
      hospitalName,
      note: noteParts.join('')
    });
  });

  computeGaps().forEach(g=>{
    const fm = (g.fromLabel||'').match(/(\d+)年(\d+)?/);
    const tm = (g.toLabel||'').match(/(\d+)年(\d+)?/);
    const fromY = fm ? parseInt(fm[1]) : null;
    const related = eventRanges.filter(r => fromY && r.startYear <= fromY && fromY <= r.endYear).map(r=>r.label);
    const noteParts = ['通院せず。理由：' + toLabelStrings(g.reasons).join('・') + '。'];
    if(related.length) noteParts.push('この頃の出来事：' + related.join('・') + '。');
    periods.push({
      sortKey: fromY || 0,
      fromY, fromM: fm && fm[2] ? parseInt(fm[2]) : null,
      toY: tm ? parseInt(tm[1]) : null, toM: tm && tm[2] ? parseInt(tm[2]) : null,
      toIsNow: false,
      visited: false,
      hospitalName: '',
      note: noteParts.join('')
    });
  });

  periods.sort((a,b)=>a.sortKey - b.sortKey);
  return periods; // Step5：.slice(0,5)はここでは行わない。絞り込みは呼び出し元の責務に一元化する
}

// ---- 保険：文字列配列であるべき項目に古いオブジェクト配列データが残っていた場合の正規化 ----
// 文字列はそのまま使う。オブジェクトなら label を使う。それ以外は捨てる。
// 主修正はUI入力側（renderStringCheckList）。これはあくまで後方互換の保険。
function toLabelStrings(arr){
  if(!Array.isArray(arr)) return [];
  return arr.map(item=>{
    if(typeof item === 'string') return item;
    if(item && typeof item === 'object' && typeof item.label === 'string') return item.label;
    return null;
  }).filter(v=>v!==null);
}

// ---- base64文字列をArrayBufferに変換 ----
function base64ToArrayBuffer(base64){
  const binaryString = atob(base64);
  const len = binaryString.length;
  const bytes = new Uint8Array(len);
  for(let i=0;i<len;i++){ bytes[i] = binaryString.charCodeAt(i); }
  return bytes.buffer;
}

// ---- メイン：02.xlsx様式に値を差し込んでダウンロードする ----
// ---- downloadXlsxBuffer()：xlsxバッファをファイルとしてダウンロードする（既存処理を関数化） ----
// Step6で02.xlsx・04.xlsxの2ファイルを出力する必要が生じたため、既存の単発ダウンロード処理
// （Blob+a要素のクリック）を関数化して2回呼べるようにした。ZIP化等の新規ライブラリは導入していない
// （既存方針を踏襲。詳細はGPTへの報告の「出力物について」を参照）。
function downloadXlsxBuffer(buffer, filename){
  const blob = new Blob([buffer], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function exportToOfficialForm(){
  if(typeof ExcelJS === 'undefined'){
    // ここでalertして握りつぶすと、呼び出し元（stepCh5Done）が「成功」とみなしてしまう。
    // 失敗として呼び出し元のcatchに伝え、ボタン側で失敗メッセージ・再試行可能な状態に戻す。
    throw new Error('ExcelJSライブラリの読み込みが完了していません。もう一度お試しください。');
  }

  const buffer = base64ToArrayBuffer(TEMPLATE_02_XLSX_BASE64);
  const wb = new ExcelJS.Workbook();
  await wb.xlsx.load(buffer);

  const front = wb.getWorksheet('表');
  const back = wb.getWorksheet('裏');

  // ---- 表面：傷病名・発病日・初診日 ----
  // 現状モックには「傷病名」「発病日」「初診日」を直接聞く項目がないため、
  // 入力があれば反映、なければ空欄のままにする（将来ヒアリング項目を追加予定）
  if(state.byomei) front.getCell('M3').value = state.byomei;
  if(state.onset && state.onset.year){
    const [g,y] = yearToWareki(state.onset.year);
    front.getCell('H4').value = g;
    front.getCell('N4').value = y;
    front.getCell('Q4').value = state.onset.month || '';
  }
  if(state.firstVisit && state.firstVisit.year){
    const [g,y] = yearToWareki(state.firstVisit.year);
    front.getCell('AB4').value = g;
    front.getCell('AH4').value = y;
    front.getCell('AK4').value = state.firstVisit.month || '';
  }

  // ---- 表面・続紙：期間（Step6：Step5 row経路へ正式接続） ----
  // 旧 buildPeriodsForForm().slice(0,5) への直接依存はここで撤去した。
  // row生成 → 圧縮 → 02/04割り振り → 02/04書き込み、の順（仕様書5.5章・9.1章、Step6）。
  const currentRows = buildCurrentPeriodRows();
  // 02(5行)+04(11行)=16行が全体の枠。currentRowsが多い場合はその分過去編の使える枠が減る。
  const availableSlotsForPast = Math.max(0, 16 - currentRows.length);
  const compressed = compressPastRowsIfNeeded(state.pastFragments, state.pastHospitals, availableSlotsForPast);
  if(compressed && compressed.error){
    // compressPastRowsIfNeeded()は明示エラーオブジェクトを返す方式（pure function方針）。
    // exportToOfficialForm()自体は既存throw方式（呼び出し元stepCh5Doneでcatchする設計）のため、
    // ここでthrowに変換して既存のエラーハンドリング経路に乗せる。
    throw new Error(compressed.message);
  }
  const pastRows = compressed;
  const { mainRows, continuationRows } = allocateRowsToMainAndContinuation(currentRows, pastRows);

  writeRowsToMainSheet(front, mainRows);

  // continuationRowsが1件以上ある場合のみ04.xlsxを生成する（0件なら04は不要・生成しない）
  let outBuffer04 = null;
  if(continuationRows.length > 0){
    const buffer04 = base64ToArrayBuffer(TEMPLATE_04_XLSX_BASE64);
    const wb04 = new ExcelJS.Workbook();
    await wb04.xlsx.load(buffer04);
    const front04 = wb04.getWorksheet('表');
    const back04 = wb04.getWorksheet('裏');
    writeRowsToContinuationSheet(front04, back04, continuationRows);
    outBuffer04 = await wb04.xlsx.writeBuffer();
  }

  // ---- 裏面：現在（請求日頃）の就労状況 ----
  const work = state.work || {};
  back.getCell('AP33').value = work.jobType || '';
  back.getCell('AW34').value = (work.commute||[]).join('・');
  const hm = COMMUTE_TIME_TO_HM[work.commuteTime];
  if(hm){
    back.getCell('BA35').value = hm[0];
    back.getCell('BJ35').value = hm[1];
  }
  back.getCell('BB36').value = work.workDays || '';
  back.getCell('AP37').value = (work.condition||[]).join('・');

  // 仕事をしていない理由
  const otherNoteParts = [];
  toLabelStrings(state.notWorkReasons).forEach(reason=>{
    const letter = NOTWORK_REASON_MAP[reason] || 'オ';
    const row = NOTWORK_REASON_ROW[letter];
    back.getCell(`AO${row}`).value = 'レ';
    if(letter==='オ' && reason!=='その他') otherNoteParts.push(reason);
  });
  if(state.notWorkReasons.includes('その他') && state.notWorkReasonOther) otherNoteParts.push(state.notWorkReasonOther);
  if(otherNoteParts.length) back.getCell('BC44').value = otherNoteParts.join('・');

  // ADL（10項目、現在セクション）
  Object.keys(state.adl||{}).forEach(key=>{
    const map = ADL_CELL_MAP[key];
    if(!map) return;
    const level = state.adl[key];
    const num = ADL_LEVEL_TO_NUM[level];
    if(!num) return;
    const col = map[num-1];
    const row = map[4];
    back.getCell(`${col}${row}`).value = 'レ';
  });

  // その他日常生活で不便（自由記述）
  let otherText = toLabelStrings(state.otherChips).join('・');
  if(state.otherNote){ otherText = otherText ? (otherText + '／' + state.otherNote) : state.otherNote; }
  back.getCell('AP55').value = otherText;

  // ---- 裏面：障害認定日頃の状況／障害者手帳（今回追加分。GPT指示書方針） ----
  // 既存のperiod rowロジック（buildCurrentPeriodRows等）やStep5/6の出力経路とは独立した処理。
  // enabled===falseの場合は何もせず、02裏面は元のプレースホルダのまま（既存出力に影響しない）。
  writeRecognitionSnapshotToBack(back, state.recognitionSnapshot);
  writeDisabilityNotebookToBack(back, state.disabilityNotebook);

  // ---- ファイル出力 ----
  // 02.xlsxは常にダウンロードする。04.xlsxはcontinuationRowsが1件以上ある場合のみ続けてダウンロードする。
  // ZIPにまとめる等のUI変更は行わず、既存の単発ダウンロード方式を2回呼ぶ形にとどめた
  // （新規ライブラリ導入や挙動変更は今回のスコープ外。詳細はGPTへの報告を参照）。
  const outBuffer = await wb.xlsx.writeBuffer();
  downloadXlsxBuffer(outBuffer, '病歴・就労状況等申立書.xlsx');
  if(outBuffer04){
    downloadXlsxBuffer(outBuffer04, '病歴・就労状況等申立書(続紙).xlsx');
  }
}

const TIME_BUCKET_LABELS = {child:'子供のころ', student:'学生時代', working:'働いてから', unknown:'わからない'};
const PAST_HOSPITAL_CONFIDENCE = [['certain','資料で確認した'],['approximate','たぶん合っている'],['unsure','覚えていない']];

// ===== 過去編 state 移行処理（Phase4仕様書6.3章）=====
// loadStateFromStorage() の戻り値に対して必ず通す。
// 「無い場合のみ補う」が原則。既存フィールドは絶対に上書きしない。
function migrateAppState(raw){
  if(!raw || typeof raw !== 'object') return raw;
  const s = raw;

  // stateVersionが無い、または不正値の場合は version 1 相当として扱う
  const currentVersion = (typeof s.stateVersion === 'number' && s.stateVersion >= 1)
    ? s.stateVersion
    : 1;

  if(currentVersion < 2){
    // 過去編キーが無い場合のみ初期値で補う（既存データの上書きはしない）
    if(!Array.isArray(s.pastFragments)) s.pastFragments = [];
    if(!Array.isArray(s.pastHospitals)) s.pastHospitals = [];
    if(!s.pastIdCounters || typeof s.pastIdCounters !== 'object'){
      s.pastIdCounters = { fragment:1, hospital:1 };
    }
    if(!Array.isArray(s.pastPeriodSplitHints)) s.pastPeriodSplitHints = [];
  }

  if(currentVersion < 3){
    // 02裏面オプション入力キーが無い場合のみ初期値で補う（既存データの上書きはしない）
    if(!s.recognitionSnapshot || typeof s.recognitionSnapshot !== 'object'){
      s.recognitionSnapshot = {
        enabled:false,
        work:{status:null, jobType:'', commute:[], commuteTime:null, workDays:'', condition:[]},
        notWorkReasons:[],
        adl:{},
        otherChips:[], otherNote:''
      };
    }
    if(!s.disabilityNotebook || typeof s.disabilityNotebook !== 'object'){
      s.disabilityNotebook = {
        enabled:false,
        type:'', otherTypeName:'', grade:'',
        acquiredKind:'none', acquiredYear:'', acquiredMonth:'', acquiredDay:'',
        disabilityName:'', note:''
      };
    }
  }

  if(currentVersion < 4){
    // 不就労理由「オ：その他」の自由記述欄が無い場合のみ初期値で補う（既存データの上書きはしない）
    if(typeof s.notWorkReasonOther !== 'string') s.notWorkReasonOther = '';
    if(s.recognitionSnapshot && typeof s.recognitionSnapshot === 'object'
       && typeof s.recognitionSnapshot.notWorkReasonOther !== 'string'){
      s.recognitionSnapshot.notWorkReasonOther = '';
    }
  }

  // 不足キーの個別チェックとは独立して、バージョン番号自体は必ず最新へ更新する
  s.stateVersion = CURRENT_STATE_VERSION;

  return s;
}

// ===== 過去編：断片（PastFragment）CRUD関数群 =====
// Phase4仕様書5.1章。既存hospitalsと同じ「永続ID＋findIndex」方式で統一する。

// 役割：断片入力の検証。Phase4仕様書5.3章。
function validatePastFragment(input){
  const errors = [];
  if(input.text !== undefined && (!input.text || !input.text.trim())){
    errors.push('text_required');
  }
  if(input.timeBucket !== undefined && input.timeBucket !== null && !TIME_BUCKETS.includes(input.timeBucket)){
    errors.push('invalid_timeBucket');
  }
  if(input.linkedHospitalId){
    const exists = state.pastHospitals.some(h=>h.hospitalId===input.linkedHospitalId);
    if(!exists) errors.push('invalid_linkedHospitalId');
  }
  return { valid: errors.length===0, errors };
}

// 役割：新規断片を追加する。Phase4仕様書5.1章。
function addPastFragment(input){
  const check = validatePastFragment({ text: input.text });
  if(!check.valid) return null;
  const id = 'pf_' + state.pastIdCounters.fragment++;
  const fragment = {
    id,
    text: input.text.trim(),
    timeBucket: (input.timeBucket && TIME_BUCKETS.includes(input.timeBucket)) ? input.timeBucket : 'unknown',
    createdAt: new Date().toISOString()
  };
  state.pastFragments.push(fragment);
  return fragment;
}

// 役割：既存断片の一部フィールドを更新する。Phase4仕様書5.1章。
function updatePastFragment(id, patch){
  const idx = state.pastFragments.findIndex(f=>f.id===id);
  if(idx<0) return null;
  // linkedHospitalIdは存在しないIDを渡された場合、安全側に倒してundefinedへ補正する
  const safePatch = {...patch};
  if(safePatch.linkedHospitalId){
    const exists = state.pastHospitals.some(h=>h.hospitalId===safePatch.linkedHospitalId);
    if(!exists) safePatch.linkedHospitalId = undefined;
  }
  if(safePatch.text !== undefined){
    const check = validatePastFragment({ text: safePatch.text });
    if(!check.valid) return null;
    safePatch.text = safePatch.text.trim();
  }
  state.pastFragments[idx] = {...state.pastFragments[idx], ...safePatch, updatedAt: new Date().toISOString()};
  return state.pastFragments[idx];
}

// 役割：断片を削除する。Phase4仕様書5.1章。
function deletePastFragment(id){
  const idx = state.pastFragments.findIndex(f=>f.id===id);
  if(idx<0) return false;
  state.pastFragments.splice(idx,1);
  return true;
}

// ===== 過去編：病院（PastHospital）CRUD関数群 =====
// Phase4仕様書5.2章。現状編 state.hospitals とは別の配列。混同しないこと。

function validatePastHospital(input){
  const errors = [];
  if(input.name !== undefined && (!input.name || !input.name.trim())){
    errors.push('name_required');
  }
  if(input.confidence !== undefined && !PAST_HOSPITAL_CONFIDENCE.some(c=>c[0]===input.confidence)){
    errors.push('invalid_confidence');
  }
  return { valid: errors.length===0, errors };
}

function addPastHospital(input){
  const check = validatePastHospital({ name: input.name, confidence: input.confidence });
  if(!check.valid) return null;
  const hospitalId = 'ph_' + state.pastIdCounters.hospital++;
  const hospital = {
    hospitalId,
    name: input.name.trim(),
    ongoing: !!input.ongoing,
    confidence: input.confidence
  };
  if(input.from) hospital.from = input.from;
  if(!hospital.ongoing && input.to) hospital.to = input.to;
  if(input.memo) hospital.memo = input.memo;
  state.pastHospitals.push(hospital);
  return hospital;
}

function updatePastHospital(hospitalId, patch){
  const idx = state.pastHospitals.findIndex(h=>h.hospitalId===hospitalId);
  if(idx<0) return null;
  if(patch.name !== undefined || patch.confidence !== undefined){
    const check = validatePastHospital({
      name: patch.name !== undefined ? patch.name : state.pastHospitals[idx].name,
      confidence: patch.confidence !== undefined ? patch.confidence : state.pastHospitals[idx].confidence
    });
    if(!check.valid) return null;
  }
  const safePatch = {...patch};
  if(safePatch.name !== undefined) safePatch.name = safePatch.name.trim();
  // ongoing:trueにする場合は既存のtoを消す（Phase4仕様書3.3.4）
  if(safePatch.ongoing === true) safePatch.to = undefined;
  state.pastHospitals[idx] = {...state.pastHospitals[idx], ...safePatch};
  return state.pastHospitals[idx];
}

// 役割：病院カードを削除する。紐づく断片のlinkedHospitalIdを必ず掃除する（Phase4仕様書5.2章）。
function deletePastHospital(hospitalId){
  const idx = state.pastHospitals.findIndex(h=>h.hospitalId===hospitalId);
  if(idx<0) return false;
  state.pastHospitals.splice(idx,1);
  // この病院にリンクしていた断片は、断片自体は消さずlinkedHospitalIdのみ外す
  state.pastFragments.forEach(f=>{
    if(f.linkedHospitalId === hospitalId){
      f.linkedHospitalId = undefined;
    }
  });
  return true;
}

// 過去編病院専用の確信度バッジ。既存badgeForConfidence()はCONFIDENCE（'certain'|'approximate'|'unknown'）
// 専用で3値目の名称が異なるため、PAST_HOSPITAL_CONFIDENCE（3値目'unsure'）用に分けて定義する。
function badgeForPastConfidence(conf){
  if(conf==='certain') return '<span class="badge badge-good">資料で確認</span>';
  if(conf==='approximate') return '<span class="badge badge-warn">たぶん</span>';
  return '<span class="badge badge-neutral">覚えていない</span>';
}

// =====================================================================
// 過去編：group / row 生成ロジック（Phase4仕様書5.3〜5.4章）。Step4。
// 重要：このセクションの関数はすべて pure function 寄りに作る。
// state.pastFragments / state.pastHospitals を「読む」のみで、一切書き換えない。
// 戻り値で完結させ、state.cachedXxx のような形でキャッシュ保存は絶対に行わない
// （導出データは永続保存しない方針。仕様書4-2章・6.8章）。
// buildPastPeriodGroups() / convertPastGroupsToFormRows() の2段階分離は崩さない。
// =====================================================================

// ---- 補助：断片id→断片オブジェクトのMap（仕様書5.3章） ----
function buildFragmentMap(fragments){
  // 引数を受け取れるようにし、テストや将来の差し替えを容易にする。
  // 省略時はstate.pastFragmentsを参照する（既存の呼び出しパターンに合わせる）。
  const list = fragments || state.pastFragments;
  const map = new Map();
  list.forEach(f=>map.set(f.id, f));
  return map;
}

// ---- 補助：病院をfrom昇順でソート。from不明は末尾、内部順は登録順を保つ安定ソート（仕様書5.3章） ----
function sortPastHospitalsForTimeline(hospitals){
  const list = hospitals || state.pastHospitals;
  // from文字列を比較可能なキーに変換する。'YYYY-MM'形式を想定するが、年のみ('YYYY')も許容する。
  // 不明（空・undefined）は最大値相当のキーを与えて末尾に送る。
  const withIndex = list.map((h, idx)=>({h, idx}));
  const keyOf = h => (h.from && h.from.trim()) ? h.from.trim() : null;
  withIndex.sort((a,b)=>{
    const ka = keyOf(a.h), kb = keyOf(b.h);
    if(ka===null && kb===null) return a.idx - b.idx; // 両方不明：登録順を保つ（安定ソート）
    if(ka===null) return 1;  // aが不明なら後ろへ
    if(kb===null) return -1; // bが不明なら後ろへ
    if(ka < kb) return -1;
    if(ka > kb) return 1;
    return a.idx - b.idx; // from同値なら登録順を保つ
  });
  return withIndex.map(x=>x.h);
}

// ---- computePastGaps()：病院間の未受診期間を算出（仕様書5.3章） ----
// gapが「どの病院の後ろ・どの病院の前に入るか」を病院IDで明示する（値一致による曖昧さを避けるため）。
function computePastGaps(hospitals){
  const sorted = sortPastHospitalsForTimeline(hospitals);
  // from不明の病院が末尾に集まっている可能性がある。
  // from/toが両方確定している病院同士の間にのみgapを置く（時期不明区間にgapを置くと誤情報になるため）。
  const withDates = sorted.filter(h=>h.from && h.from.trim());
  const gaps = [];
  for(let i=0; i<withDates.length-1; i++){
    const cur = withDates[i];
    const next = withDates[i+1];
    // ongoing中の病院の直後にgapは生まれない（現在も通院中のため、次の病院との間に空白は無い）
    if(cur.ongoing) continue;
    const curEnd = cur.to && cur.to.trim();
    const nextStart = next.from && next.from.trim();
    if(!curEnd || !nextStart) continue; // どちらか不明ならgapを算出しない
    if(curEnd < nextStart){
      gaps.push({
        type:'gap',
        from: curEnd,
        to: nextStart,
        prevHospitalId: cur.hospitalId,
        nextHospitalId: next.hospitalId
      });
    }
    // curEnd >= nextStart（連続・重複）の場合はgapなし
  }
  return gaps;
}

// ---- student分割トリガー判定（仕様書B-3） ----
// 閾値は仮値。10章で未決論点として明示されている定数なので、変更しやすいようファイル先頭級の定数にしてもよいが、
// Step4時点ではこの関数内に留める（呼び出し側が増えてから定数へ切り出す）。
const PAST_STUDENT_SPLIT_THRESHOLD = 5; // 断片数がこれ以上ならstudent分割を検討する仮値（仕様書10-1章）
function shouldSplitStudentBucket(studentFragments){
  if(studentFragments.length >= PAST_STUDENT_SPLIT_THRESHOLD) return true;
  // timeDetailが設定されている断片が複数あり、内容上の時期差が読み取れる場合も分割対象（仕様書B-3）。
  // Step4時点では「内容上の時期差の読み取り」は自動判定が難しいため、
  // 「timeDetailが設定されている断片が2件以上」という単純な代理条件で近似する。
  const withDetail = studentFragments.filter(f=>f.timeDetail && f.timeDetail.trim());
  if(withDetail.length >= 2) return true;
  return false;
}

// student分割時のサブグループ分け（仕様書B-3：粗いラベル「学生前期」「学生後期」）。
// Step4時点では厳密な時期判定ロジックを持たないため、timeDetailの有無で前期/後期に振り分ける
// 暫定実装とする（timeDetailありを後期寄りとみなす根拠はない。これは仮置き。詳細はD節で報告）。
function splitStudentFragmentsIntoSubGroups(studentFragments){
  // createdAtの古い順に並べ、半分で前期/後期に分ける、という最も単純な暫定ルール。
  // 「内容上の時期差」を厳密に読み取る自動判定はStep4のスコープ外（B-3参照）。
  const sorted = [...studentFragments].sort((a,b)=> new Date(a.createdAt) - new Date(b.createdAt));
  const mid = Math.ceil(sorted.length / 2);
  const former = sorted.slice(0, mid);
  const latter = sorted.slice(mid);
  const subGroups = [];
  if(former.length){
    subGroups.push({ type:'preClinicalBucket', bucket:'student', subBucketLabel:'学生前期', fragmentIds: former.map(f=>f.id) });
  }
  if(latter.length){
    subGroups.push({ type:'preClinicalBucket', bucket:'student', subBucketLabel:'学生後期', fragmentIds: latter.map(f=>f.id) });
  }
  return subGroups;
}

// ---- buildPastPeriodGroups()：標準順に並んだPastPeriodGroup[]を構築（仕様書5.4章、B-9） ----
function buildPastPeriodGroups(options){
  const opts = options || {};
  const allowStudentSplit = opts.allowStudentSplit !== false; // 省略時はtrue
  const fragments = state.pastFragments;
  const hospitals = state.pastHospitals;

  const groups = [];
  const consumedFragmentIds = new Set(); // どのgroupにも吸収された断片IDを記録（unknownFallback判定に使う）

  // --- ① PreClinicalBucketGroup群：child → student → working（仕様書B-9） ---
  ['child','student','working'].forEach(bucket=>{
    const bucketFragments = fragments.filter(f=>!f.linkedHospitalId && f.timeBucket===bucket);
    if(bucketFragments.length===0) return;
    if(bucket==='student' && allowStudentSplit && shouldSplitStudentBucket(bucketFragments)){
      const subGroups = splitStudentFragmentsIntoSubGroups(bucketFragments);
      subGroups.forEach(g=>{
        groups.push(g);
        g.fragmentIds.forEach(id=>consumedFragmentIds.add(id));
      });
    } else {
      groups.push({ type:'preClinicalBucket', bucket, fragmentIds: bucketFragments.map(f=>f.id) });
      bucketFragments.forEach(f=>consumedFragmentIds.add(f.id));
    }
  });

  // --- ② HospitalGroup / GapGroup 交互列（仕様書B-9） ---
  const sortedHospitals = sortPastHospitalsForTimeline(hospitals);
  const gaps = computePastGaps(hospitals);
  // 病院をfrom昇順、ongoing病院は末尾寄り（5.4章：「ongoing:trueの病院は明示的に末尾優先で扱う」）に並べ直す。
  // sortPastHospitalsForTimeline()は既にfrom昇順だが、ongoingをさらに末尾へ寄せるため、
  // 「ongoingでない病院（from確定）→ongoingでない病院（from不明）→ongoing病院」の順に安定的に並べ替える。
  const nonOngoing = sortedHospitals.filter(h=>!h.ongoing);
  const ongoingHospitals = sortedHospitals.filter(h=>h.ongoing);
  const hospitalOrder = [...nonOngoing, ...ongoingHospitals];

  hospitalOrder.forEach((h, idx)=>{
    const linkedFragmentIds = fragments.filter(f=>f.linkedHospitalId===h.hospitalId).map(f=>f.id);
    groups.push({
      type:'hospital',
      hospitalId: h.hospitalId,
      from: h.from,
      to: h.to,
      ongoing: !!h.ongoing,
      linkedFragmentIds
    });
    linkedFragmentIds.forEach(id=>consumedFragmentIds.add(id));

    // この病院とhospitalOrder内の次の病院との間にgapがあれば、ここで挟む。
    // 値（from/to文字列）の一致ではなく、computePastGaps()が返すprevHospitalIdで対応付ける。
    // 同一ラベルの病院が複数あっても、IDベースなので曖昧にならない。
    if(idx < hospitalOrder.length - 1 && !h.ongoing){
      const matchingGap = gaps.find(g=>g.prevHospitalId===h.hospitalId);
      if(matchingGap){
        groups.push(matchingGap);
      }
    }
  });

  // --- ③ UnknownFallbackGroup：常に最後尾、1件のみ（仕様書B-4、B-9） ---
  const unknownFragments = fragments.filter(f=>
    !consumedFragmentIds.has(f.id) && !f.linkedHospitalId && f.timeBucket==='unknown'
  );
  if(unknownFragments.length > 0){
    groups.push({ type:'unknownFallback', fragmentIds: unknownFragments.map(f=>f.id) });
  }

  return groups;
}

// ---- note生成補助：文字数で間引く際の簡易ヘルパー（仕様書B-6共通） ----
const PAST_NOTE_MAX_LENGTH = 200; // 続紙の状況欄に収まる目安の仮値（10章未決論点と同様、調整可能パラメータ）
function pickFragmentText(fragment){
  // memo優先、空ならtext（仕様書B-6①②共通ルール）
  return (fragment.memo && fragment.memo.trim()) ? fragment.memo.trim() : fragment.text;
}

// ---- buildHospitalGroupNote()：HospitalGroupのnote（仕様書B-6①） ----
function buildHospitalGroupNote(group, fragmentMap, hospital){
  const parts = [];
  // 優先度1：病院カード自身のmemo（病院期間全体を説明する情報。最優先で全文残す）
  if(hospital && hospital.memo && hospital.memo.trim()){
    parts.push(hospital.memo.trim());
  }
  // 優先度2,3：linked fragmentのmemo優先、空ならtext
  const linkedTexts = group.linkedFragmentIds
    .map(id=>fragmentMap.get(id))
    .filter(Boolean)
    .map(f=>pickFragmentText(f))
    .filter(t=>t && t.trim());

  let combined = parts.concat(linkedTexts).join('／');
  if(combined.length > PAST_NOTE_MAX_LENGTH){
    // 長すぎる場合：①(hospital.memo)を最優先で全文残し、②③(linked fragment由来)を文字数に応じて間引く。
    // 間引きは「短い断片を残す」簡易ルールで十分（仕様書5.4章備考）。
    let hospitalMemoText = parts.join('／');
    // B-5修正：hospital.memo単体がPAST_NOTE_MAX_LENGTHを超える場合、以前はここで切り詰めずに
    // 全文をそのまま残していたため、上限が実質守られていなかった（remainingが負数になり、
    // fragmentsが0件になるだけで、memo自体はサイレントに上限を超えたまま返っていた）。
    // まずmemo自体を上限内に切り詰めてから、空いた残り文字数でfragmentsを追加する流れに修正する。
    // 切り詰め記号「…」は既存コードに先例がないため新規に導入するが、途中で切れていることが
    // 視覚的にわかるようにする（無言で切れるより安全）。
    if(hospitalMemoText.length > PAST_NOTE_MAX_LENGTH){
      hospitalMemoText = hospitalMemoText.slice(0, Math.max(0, PAST_NOTE_MAX_LENGTH - 1)) + '…';
    }
    let remaining = PAST_NOTE_MAX_LENGTH - hospitalMemoText.length;
    const sortedByLength = [...linkedTexts].sort((a,b)=>a.length - b.length);
    const kept = [];
    for(const t of sortedByLength){
      if(remaining <= 0) break;
      // 結合時に追加される区切り文字「／」1字分もコストに含める。
      // hospitalMemoTextが空文字（hospital.memoが無いケース）の場合、最初の要素には
      // 区切り文字が付かないため、kept.length===0かつhospitalMemoTextが空の場合は0字とする
      // （以前はこの区切り文字分を計算に入れておらず、結合後にPAST_NOTE_MAX_LENGTHを
      // 1〜数字超えることがあった。memo自体の切り詰めと合わせてここで解消する）。
      const separatorCost = (kept.length > 0 || hospitalMemoText) ? 1 : 0;
      const cost = t.length + separatorCost;
      if(cost <= remaining){ kept.push(t); remaining -= cost; }
    }
    combined = [hospitalMemoText, ...kept].filter(Boolean).join('／');
  }
  return combined;
}

// ---- buildPreClinicalBucketNote()：PreClinicalBucketGroupのnote（仕様書B-6②） ----
function buildPreClinicalBucketNote(group, fragmentMap){
  const texts = group.fragmentIds
    .map(id=>fragmentMap.get(id))
    .filter(Boolean)
    .map(f=>pickFragmentText(f))
    .filter(t=>t && t.trim());

  let combined = texts.join('／');
  if(combined.length > PAST_NOTE_MAX_LENGTH){
    // 長すぎる場合：memoがある断片＞timeDetailがある断片＞その他の順で残す（仕様書B-6②）
    const fragments = group.fragmentIds.map(id=>fragmentMap.get(id)).filter(Boolean);
    const scored = fragments.map(f=>({
      f,
      priority: (f.memo && f.memo.trim()) ? 2 : ((f.timeDetail && f.timeDetail.trim()) ? 1 : 0)
    })).sort((a,b)=>b.priority - a.priority);
    let remaining = PAST_NOTE_MAX_LENGTH;
    const kept = [];
    for(const {f} of scored){
      const t = pickFragmentText(f);
      if(!t || !t.trim()) continue;
      if(remaining <= 0) break;
      if(t.length <= remaining){ kept.push(t); remaining -= t.length; }
    }
    combined = kept.join('／');
  }
  return combined;
}

// ---- buildUnknownFallbackNote()：UnknownFallbackGroupのnote（仕様書B-6④） ----
const PAST_UNKNOWN_FALLBACK_MAX_ITEMS = 5; // 上位N件の仮値（仕様書10章未決論点。10-1章でN=5を提案済み）
function buildUnknownFallbackNote(group, fragmentMap){
  const fragments = group.fragmentIds.map(id=>fragmentMap.get(id)).filter(Boolean);
  // 優先順位：①memoがある断片 ②timeDetailがある断片 ③textが具体的な断片（仕様書B-6④）
  const scored = fragments.map(f=>({
    f,
    priority: (f.memo && f.memo.trim()) ? 2 : ((f.timeDetail && f.timeDetail.trim()) ? 1 : 0)
  })).sort((a,b)=>b.priority - a.priority);

  const totalCount = scored.length;
  const top = scored.slice(0, PAST_UNKNOWN_FALLBACK_MAX_ITEMS);
  const texts = top.map(({f})=>pickFragmentText(f)).filter(t=>t && t.trim());
  let combined = texts.join('／');
  if(totalCount > PAST_UNKNOWN_FALLBACK_MAX_ITEMS){
    combined += (combined ? '。' : '') + '（他にも時期不明の出来事あり）';
  }
  return combined;
}

// ---- from/toの表示ラベル生成（仕様書B-5：from/to不明時は「時期不明」） ----
function formatPastDateLabel(dateStr){
  return (dateStr && dateStr.trim()) ? dateStr.trim() : '時期不明';
}

// ---- parsePastYearMonth()：PastHospital.from/to・gap.from/toの'YYYY-MM'または'YYYY'文字列を年月に分解する ----
// Step6追加。past側の日付は'YYYY-MM'形式の文字列（型定義4-1章）で保持されているため、
// Excel書き込み用のdate partsを作るにはここで数値に分解する必要がある。
// 形式が想定と異なる場合（手入力データの後方互換等）は安全側に倒してkind:'none'相当（null）を返す。
// B-2修正：年のみ('YYYY')入力も受け付ける。月が無い場合はmonth:undefinedを返し、
// 呼び出し元（convertPastGroupsToFormRows）でkind:'y'（年のみ）として扱えるようにする
// （年情報がパース失敗で丸ごと欠落していた問題の修正。以前は'YYYY-MM'形式以外は常にnull＝kind:'none'扱いだった）。
function parsePastYearMonth(dateStr){
  if(!dateStr || typeof dateStr !== 'string') return null;
  const trimmed = dateStr.trim();

  const ym = trimmed.match(/^(\d{4})-(\d{1,2})$/);
  if(ym){
    const year = parseInt(ym[1], 10);
    const month = parseInt(ym[2], 10);
    if(!year || !month || month < 1 || month > 12) return null;
    return { year, month };
  }

  const yOnly = trimmed.match(/^(\d{4})$/);
  if(yOnly){
    const year = parseInt(yOnly[1], 10);
    if(!year) return null;
    return { year, month: undefined };
  }

  return null;
}

// ---- yearMonthKind()：parsePastYearMonth()の結果からExcel書き込み用kindを判定する ----
// B-2修正で追加。year+monthが揃えば'ym'、yearのみなら'y'、パース失敗(null)なら'none'。
// fromKind/toKindの判定が4箇所（hospital from/to、gap from/to）に分散していたため、
// 判定ロジックを1箇所にまとめ、年のみ入力の扱いが分岐ごとに食い違わないようにする。
function yearMonthKind(ym){
  if(!ym) return 'none';
  return ym.month ? 'ym' : 'y';
}

const PAST_BUCKET_FIXED_LABELS = { child:'子供のころ', student:'学生時代', working:'働き始めてから' };

// ---- convertPastGroupsToFormRows()：PastPeriodGroup[]をPastFormPeriodRow[]に変換（仕様書5.4章） ----
// Step6改修：hospital/gapはfrom/toが'YYYY-MM'形式の文字列を持つため、parsePastYearMonth()で
// 数値に分解しdate partsとして両持ちする。preClinicalBucket/unknownFallbackはそもそも特定の
// 年月を持たない設計（B-9等）のため、kind:'none'のまま（Excel日付セルには書き込まず空欄にする。
// 書き込み側がnote欄にラベルを残す）。
function convertPastGroupsToFormRows(groups){
  const fragmentMap = buildFragmentMap(state.pastFragments);
  const hospitalMap = new Map(state.pastHospitals.map(h=>[h.hospitalId, h]));

  // 日付なしrow用の共通date parts（preClinicalBucket・unknownFallback・パース失敗時に使う）
  const NO_DATE_PARTS = { fromKind:'none', fromYear:undefined, fromMonth:undefined, toKind:'none', toYear:undefined, toMonth:undefined, toDay:undefined };

  return groups.map(group=>{
    try{
      if(group.type==='hospital'){
        const hospital = hospitalMap.get(group.hospitalId);
        const note = buildHospitalGroupNote(group, fragmentMap, hospital);
        const fromYM = parsePastYearMonth(group.from);
        const toYM = group.ongoing ? null : parsePastYearMonth(group.to);
        const fillDate = getFormFillDate();
        return {
          fromLabel: formatPastDateLabel(group.from),
          toLabel: group.ongoing ? '現在' : formatPastDateLabel(group.to),
          visited: true,
          hospitalName: hospital ? hospital.name : undefined,
          note,
          sourceGroupType: 'hospital',
          isUnknownFallback: false,
          sourceHospitalId: group.hospitalId,
          fromKind: yearMonthKind(fromYM),
          fromYear: fromYM ? fromYM.year : undefined,
          fromMonth: fromYM ? fromYM.month : undefined,
          // ongoingの場合、元号/年/月も記入日から書く（toDayだけだと年月セルが空欄になり、
          // 現状編buildCurrentPeriodRows()のtoIsNow処理と整合しなくなる。02出力時の挙動を統一する）。
          toKind: group.ongoing ? 'now' : yearMonthKind(toYM),
          toYear: group.ongoing ? fillDate.year : (toYM ? toYM.year : undefined),
          toMonth: group.ongoing ? fillDate.month : (toYM ? toYM.month : undefined),
          toDay: group.ongoing ? fillDate.day : undefined
        };
      }
      if(group.type==='gap'){
        const fromYM = parsePastYearMonth(group.from);
        const toYM = parsePastYearMonth(group.to);
        return {
          fromLabel: formatPastDateLabel(group.from),
          toLabel: formatPastDateLabel(group.to),
          visited: false,
          note: '', // GapGroupのnoteは空欄可（仕様書B-6③）。将来拡張：手動メモ・明示リンク
          sourceGroupType: 'gap',
          isUnknownFallback: false,
          // デバッグ用：どの病院間のgapかをIDで残す（圧縮・割り振り時の追跡を容易にする）
          sourcePrevHospitalId: group.prevHospitalId,
          sourceNextHospitalId: group.nextHospitalId,
          fromKind: yearMonthKind(fromYM),
          fromYear: fromYM ? fromYM.year : undefined,
          fromMonth: fromYM ? fromYM.month : undefined,
          toKind: yearMonthKind(toYM),
          toYear: toYM ? toYM.year : undefined,
          toMonth: toYM ? toYM.month : undefined,
          toDay: undefined
        };
      }
      if(group.type==='preClinicalBucket'){
        const baseLabel = PAST_BUCKET_FIXED_LABELS[group.bucket] || group.bucket;
        const label = group.subBucketLabel ? `${baseLabel}（${group.subBucketLabel}）` : baseLabel;
        const note = buildPreClinicalBucketNote(group, fragmentMap);
        return {
          fromLabel: label,
          toLabel: label,
          visited: false,
          note,
          sourceGroupType: 'preClinicalBucket',
          isUnknownFallback: false,
          sourceBucket: group.bucket,
          ...NO_DATE_PARTS
        };
      }
      if(group.type==='unknownFallback'){
        const note = buildUnknownFallbackNote(group, fragmentMap);
        return {
          fromLabel: '時期不明',
          toLabel: '時期不明',
          visited: false,
          note,
          sourceGroupType: 'unknownFallback',
          isUnknownFallback: true,
          ...NO_DATE_PARTS
        };
      }
    }catch(err){
      // 個々のgroupでnote生成に失敗しても処理全体を止めない（仕様書5.4章）
      console.warn('過去編row変換でエラーが発生しました（このgroupはnote空文字で続行）', group, err);
      return {
        fromLabel: '時期不明',
        toLabel: '時期不明',
        visited: false,
        note: '',
        sourceGroupType: group.type==='unknownFallback' ? 'unknownFallback' : (group.type || 'unknownFallback'),
        isUnknownFallback: group.type==='unknownFallback',
        ...NO_DATE_PARTS
      };
    }
    // 想定外のgroup種別（理論上到達しないが、安全側に倒す）
    return { fromLabel:'時期不明', toLabel:'時期不明', visited:false, note:'', sourceGroupType:'unknownFallback', isUnknownFallback:true, ...NO_DATE_PARTS };
  });
}

// Step5：現状編との接続・圧縮・割り振り（Phase4仕様書5.5章、9.1章）

// ---- buildCurrentPeriodRows()：現状編dataをFormPeriodRow[]へ正規化（仕様書5.5章、9.1章） ----
// 既存buildPeriodsForForm()のロジック自体は変更していない（独自の数値分解形式はそのまま）。
// Step6改修：表示用ラベルに加え、Excel書き込み用のdate parts（fromKind/fromYear/fromMonth等）を
// 両持ちする。現状編は元々数値の年月を持っているため、ここでその数値をそのままdate partsへ転記する
// （ラベル文字列に潰す前の情報を失わない）。
// 返却順は古い→新しい固定（buildPeriodsForForm()が既にsortKey昇順でソート済みなので、その順序をそのまま使う）。
// 絞り込み（.slice(0,5)）は行わない。絞り込みはallocateRowsToMainAndContinuation()側で一元管理する（9.1章）。
function buildCurrentPeriodRows(){
  const periods = buildPeriodsForForm(); // Step5でこの関数自体は.slice(0,5)を外した（絞り込み前の全件を返す）
  return periods.map(period=>{
    const fromLabel = formatCurrentDateLabel(period.fromY, period.fromM);
    const toLabel = period.toIsNow ? '現在' : formatCurrentDateLabel(period.toY, period.toM);

    const fromKind = period.fromY ? (period.fromM ? 'ym' : 'y') : 'none';

    let toKind, toYear, toMonth, toDay;
    if(period.toIsNow){
      toKind = 'now';
      // buildPeriodsForForm()はtoIsNowの場合、period.toY/toMに既に記入日の年月を入れている（177〜180行目）。
      // 既存exportToOfficialForm()は元号/年/月「も」記入日から書いていたため、ここで両方転記する
      // （toDayだけ持たせると年月セルが空欄になってしまい、既存挙動から後退する）。
      toYear = period.toY || undefined;
      toMonth = period.toM || undefined;
      toDay = getFormFillDate().day;
    } else {
      toKind = period.toY ? (period.toM ? 'ym' : 'y') : 'none';
      toYear = period.toY || undefined;
      toMonth = period.toM || undefined;
    }

    return {
      fromLabel,
      toLabel,
      visited: !!period.visited,
      hospitalName: period.hospitalName || undefined,
      note: period.note || '',
      fromKind,
      fromYear: period.fromY || undefined,
      fromMonth: period.fromM || undefined,
      toKind,
      toYear,
      toMonth,
      toDay
    };
  });
}

// 現状編の年/月をラベル文字列に変換する補助（過去編のformatPastDateLabel()とは別。現状編は西暦年月の数値を持つため）
function formatCurrentDateLabel(year, month){
  if(!year) return '時期不明';
  return month ? `${year}年${month}月` : `${year}年`;
}

// ---- mergeAllPeriodRows()：単純結合と件数集計のみ（仕様書5.5章、圧縮も割り振りもしない） ----
function mergeAllPeriodRows(currentRows, pastRows){
  return {
    currentRows,
    pastRows,
    totalCount: currentRows.length + pastRows.length,
    currentCount: currentRows.length,
    pastCount: pastRows.length
  };
}

// ---- compressPastRowsIfNeeded()：必要に応じてgroup段階から再構成するオーケストレータ（仕様書5.5章A案） ----
// row配列を直接splice・並べ替えしない。buildPastPeriodGroups()のオプションを変えて呼び直すだけ。
// 順序の決定権は常にbuildPastPeriodGroups()にあり、この関数は順序を変更しない（GPT確認2の前提）。
function compressPastRowsIfNeeded(pastFragments, pastHospitals, availableSlots, options){
  // ===== この関数の3段階の役割（誤解しやすいので明記） =====
  // 第1段階・第2段階：実際に行数を減らす（student分割の解除によりgroupの数自体が減る）。
  // 第3段階：行数は削減しない。unknownFallback行1件分のnoteの文字数を短縮するだけの処理。
  //   関数名・呼び出し元の文言（「圧縮」「まとめて出力」等）から、第3段階も行数を減らす
  //   ように見えるが、実際にはrows.lengthは第3段階の前後で変化しない。
  //   そのため、第1・2段階で収まらなかった場合、第3段階を経てもavailableSlotsに収まらなければ
  //   必ずエラーになる（このことはB-4で確認済み。今回はコメント整理のみで、行数削減化などの
  //   ロジック変更は行わない）。
  //
  // 注：pastFragments/pastHospitalsは引数で受け取るが、現在のbuildPastPeriodGroups()実装は
  // 常にstate.pastFragments/state.pastHospitalsを直接参照する設計になっている（Step4実装）。
  // Step5時点ではstateと引数が常に一致する前提で進める（呼び出し元は必ずstateの値をそのまま渡す）。
  // 将来、引数を直接使う形に拡張する場合はbuildPastPeriodGroups()側の改修が必要（TODOとして明記）。

  // 第1段階：通常設定（student分割あり）でgroup→row生成
  let groups = buildPastPeriodGroups({ allowStudentSplit: true });
  let rows = convertPastGroupsToFormRows(groups);
  if(rows.length <= availableSlots) return rows;

  // 第2段階：student分割を解除してgroup→row再生成
  groups = buildPastPeriodGroups({ allowStudentSplit: false });
  rows = convertPastGroupsToFormRows(groups);
  if(rows.length <= availableSlots) return rows;

  // 第3段階：それでも超える場合、unknownFallback行のnoteをさらに短縮する。
  // ★この段階は行数削減ではない。unknownFallback note の短縮のみ。★
  // 「行数」自体はunknownFallbackが元々1行のため、ここでの処理はnoteの短縮のみであり、
  // rows.length（行数）はこの段階の前後で変化しない（B-7：unknownFallbackは最後尾の補助扱いで
  // 最初に削減対象になるが、1行を0行にする「削除」は現行の仕様書には明記されていないため、
  // note短縮に留めている）。
  const fallbackIdx = rows.findIndex(r=>r.isUnknownFallback);
  if(fallbackIdx >= 0){
    const fragmentMap = buildFragmentMap(state.pastFragments);
    const fallbackGroup = groups.find(g=>g.type==='unknownFallback');
    if(fallbackGroup){
      // 上位N件をさらに絞った短縮版のnoteで上書きする（既存のbuildUnknownFallbackNote()のN件上限を
      // さらに半分に絞った簡易版。厳密な再帰的圧縮ロジックは仕様書10章の未決論点）
      const shortened = buildUnknownFallbackNote(
        { ...fallbackGroup, fragmentIds: fallbackGroup.fragmentIds.slice(0, Math.max(1, Math.floor(PAST_UNKNOWN_FALLBACK_MAX_ITEMS/2))) },
        fragmentMap
      );
      rows[fallbackIdx] = { ...rows[fallbackIdx], note: shortened };
    }
  }
  if(rows.length <= availableSlots) return rows;

  // 第3段階でも収まらない場合：明示エラーを返す（投げない）。
  // 既存実装のexportToOfficialForm()はErrorをthrowする方式（呼び出し元でcatchする設計）だが、
  // この関数はpure function寄りに保ちたいため、呼び出し側が判定しやすい明示エラーオブジェクトを返す方式に統一する。
  // （呼び出し元のExcel接続（Step6）でthrowに変換するかどうかは、その時点で既存throw方式に合わせて判断する）
  return {
    error: true,
    code: 'PAST_ROWS_OVERFLOW',
    message: `過去編の件数(${rows.length}件)が利用可能な枠(${availableSlots}件)を超えており、圧縮しても収まりません。`,
    rows // 参考情報として、収まらなかった現在のrowsも返す
  };
}

// ---- allocateRowsToMainAndContinuation()：02/04割り振りの決定のみ（仕様書5.5章、B-8、B-10） ----
// B-10準拠：currentRowsが5件未満の場合、過去編からの02補充は「pastRows標準順の末尾から」取る。
// 理由：currentRowsは古い→新しいの順で02に並ぶため、その後ろの空き枠には
// 「現状に最も近い過去」を入れる必要があり、それはpastRows標準順の末尾側にある。
//
// 修正履歴：当初の擬似コード（pastRows.slice(-remaining)のみ）は、unknownFallback行を
// 02補充対象から除外する処理を含んでおらず、B-10「unknownFallbackは02補充対象から除外する」
// と矛盾する実装になっていた。本修正で、isUnknownFallbackによるフィルタを明示的に追加し、
// unknownFallback行が機械的にmainRowsへ混入する不具合を解消した。
function allocateRowsToMainAndContinuation(currentRows, pastRows){
  if(currentRows.length >= 5){
    // 1) currentRows.length >= 5 の場合：過去編からの02補充はしない（pastRowsには手を触れない）
    const mainRows = currentRows.slice(0, 5);
    const continuationRows = currentRows.slice(5).concat(pastRows);
    return { mainRows, continuationRows };
  }

  // 2) currentRows.length < 5 の場合：
  //    02補充対象はpastRows全体ではなく、isUnknownFallback !== true の行のみ。
  //    unknownFallback行はmainRowsの穴埋めに使わず、常にcontinuationRowsに残す。
  const remaining = 5 - currentRows.length;

  const normalPastRows = pastRows.filter(r => !r.isUnknownFallback);
  const unknownFallbackRows = pastRows.filter(r => r.isUnknownFallback);

  // normalPastRowsがremaining件に満たない場合は、ある分だけ補充して終わる
  // （unknownFallbackで穴埋めしない）
  const takeCount = Math.min(remaining, normalPastRows.length);
  const pastRowsForMain = normalPastRows.slice(-takeCount);
  const normalPastRowsForContinuation = normalPastRows.slice(0, normalPastRows.length - takeCount);

  const mainRows = currentRows.concat(pastRowsForMain);
  // unknownFallbackは標準順で常に最後尾にあるため、continuationRowsでも最後尾に連結する
  const continuationRows = normalPastRowsForContinuation.concat(unknownFallbackRows);
  return { mainRows, continuationRows };
}

// =====================================================================
// Step6：writeRowsToMainSheet() / writeRowsToContinuationSheet()
// 02.xlsx・04.xlsxの実テンプレ確認（Step6前半）で確定したセル番地に基づき、
// FormPeriodRow[]をExcelワークシートへ書き込む。
// =====================================================================

// ---- colOffset()：列文字（単一英大文字。A〜Zの範囲のみ対応）をn列分ずらす ----
// 本仕様書の対象セルはD〜R程度の範囲（単一文字）に収まるため、複数文字列（AA等）は扱わない。
function colOffset(col, n){
  return String.fromCharCode(col.charCodeAt(0) + n);
}

// ---- writeDatePart()：1つの日付（from側 or to側）を元号/年/月/日セルへ書き込む ----
// kind:
//   'ym'  → 元号・年・月を書く
//   'y'   → 元号・年のみ書く（月は空欄）
//   'now' → 元号・年・月・日を書く（現在も継続中。dayは記入日）
//   'none'/未設定 → 全セルを空欄にする（placeholderテキストを残さないよう明示的に空文字を書く）
function writeDatePart(ws, eraCol, yearCol, monthCol, dayCol, row0, kind, year, month, day){
  if(kind === 'none' || !kind){
    ws.getCell(`${eraCol}${row0}`).value = '';
    ws.getCell(`${yearCol}${row0}`).value = '';
    ws.getCell(`${monthCol}${row0}`).value = '';
    if(dayCol) ws.getCell(`${dayCol}${row0}`).value = '';
    return;
  }
  const [g, y] = yearToWareki(year);
  ws.getCell(`${eraCol}${row0}`).value = g;
  ws.getCell(`${yearCol}${row0}`).value = y;
  ws.getCell(`${monthCol}${row0}`).value = (kind === 'y') ? '' : (month || '');
  if(dayCol){
    ws.getCell(`${dayCol}${row0}`).value = (kind === 'now' && typeof day === 'number') ? day : '';
  }
}

// ---- writePeriodRowBlock()：1period分（5物理行）を共通ロジックで書き込む ----
// 02表・04表・04裏は「元号列を起点に、受診した=+1列・年=+5列・受診していない=+6列・月=+7列・日=+9列・
// 医療機関名=起点と同列」という共通レイアウトを持つ（Step6実テンプレ確認で確定。仕様書7.2の
// K/M/O列記載はラベル文字セルであり入力セルではなかったため、本実装ではJ/L/N側＝起点+5/+7/+9を採用）。
// 状況(note)欄の開始列は、02表のみ起点+13列（Q列が薄いスペーサーとして単独結合されている特殊構造）、
// 04表/04裏は起点+12列という実テンプレ確認済みの違いがあるため、noteColは呼び出し側で明示的に渡す。
//
// row.fromKind==='none'（preClinical・unknownFallback等、年月を持たないrow）の場合：
// 日付セルは仕様どおり空欄にするが、rowの意味（どの時期の記述か）が消えないよう、
// note欄の先頭に【fromLabel】を付与する（buildPreClinicalBucketNote()等が生成するnote本文自体は
// 変更しない。あくまでこの書き込み関数側での表示時の付加情報）。
function writePeriodRowBlock(ws, eraCol, noteCol, r0, row){
  const yearCol = colOffset(eraCol, 5);
  const monthCol = colOffset(eraCol, 7);
  const dayCol = colOffset(eraCol, 9);
  const checkYesCol = colOffset(eraCol, 1);
  const checkNoCol = colOffset(eraCol, 6);
  const nameCol = eraCol;

  const r1 = r0 + 1;
  const checkRow = r0 + 2;
  const nameRow = r0 + 3;
  const noteRow = r0 + 1;

  writeDatePart(ws, eraCol, yearCol, monthCol, null, r0, row.fromKind, row.fromYear, row.fromMonth, undefined);
  writeDatePart(ws, eraCol, yearCol, monthCol, dayCol, r1, row.toKind, row.toYear, row.toMonth, row.toDay);

  ws.getCell(`${checkYesCol}${checkRow}`).value = row.visited ? 'レ' : '';
  ws.getCell(`${checkNoCol}${checkRow}`).value = row.visited ? '' : 'レ';

  ws.getCell(`${nameCol}${nameRow}`).value = row.hospitalName || '';

  let noteText = row.note || '';
  if(row.fromKind === 'none' && row.fromLabel){
    noteText = `【${row.fromLabel}】${noteText}`;
  }
  ws.getCell(`${noteCol}${noteRow}`).value = noteText;
}

// ---- writeRowsToMainSheet()：mainRowsを02.xlsx「表」の5行枠へ書き込む（仕様書5.5章、Step6） ----
// 入力はmainRowsのみ（旧buildPeriodsForForm().slice(0,5)への依存はここにはない）。
// mainRowsはallocateRowsToMainAndContinuation()により5件以内であることが保証されているが、
// 念のため5件を超える分は書き込まない（防御的に.slice(0,5)で打ち切る）。
const MAIN_SHEET_ROW_STARTS = [18,23,28,33,38]; // 02.xlsx「表」の5ブロック開始行（実テンプレ確認済み）
function writeRowsToMainSheet(front, mainRows){
  const rows = (mainRows || []).slice(0, MAIN_SHEET_ROW_STARTS.length);
  rows.forEach((row, i)=>{
    const r0 = MAIN_SHEET_ROW_STARTS[i];
    writePeriodRowBlock(front, 'E', 'R', r0, row);
  });
}

// ---- writeRowsToContinuationSheet()：continuationRowsを04.xlsxの11行枠（表5+裏6）へ書き込む（Step6） ----
// 04表：5ブロック（開始行16,21,26,31,36）、04裏：6ブロック（開始行1,6,11,16,21,26）。
// continuationRows.length <= 11はallocateRowsToMainAndContinuation()/compressPastRowsIfNeeded()側で
// 保証される設計（仕様書5.5章・9.1章：02/04合計16行枠に収まるよう圧縮済みのrowしかここに来ない前提）。
// ただし呼び出し元の前提が崩れた場合の事故防止として、11件を超える分は書き込まずconsole.warnのみ行う
// （仕様書5.4章の方針：個々のエラーで処理全体を止めない。書き込み漏れが起きたことは検知可能にする）。
const CONTINUATION_FRONT_ROW_STARTS = [16,21,26,31,36];   // 04.xlsx「表」5ブロック
const CONTINUATION_BACK_ROW_STARTS  = [1,6,11,16,21,26];  // 04.xlsx「裏」6ブロック
function writeRowsToContinuationSheet(front04, back04, continuationRows){
  const rows = continuationRows || [];
  const capacity = CONTINUATION_FRONT_ROW_STARTS.length + CONTINUATION_BACK_ROW_STARTS.length; // 11
  if(rows.length > capacity){
    console.warn(`continuationRowsが04.xlsxの枠（${capacity}件）を超えています（${rows.length}件）。超過分は書き込まれません。`);
  }
  rows.slice(0, CONTINUATION_FRONT_ROW_STARTS.length).forEach((row, i)=>{
    writePeriodRowBlock(front04, 'E', 'Q', CONTINUATION_FRONT_ROW_STARTS[i], row);
  });
  rows.slice(CONTINUATION_FRONT_ROW_STARTS.length, capacity).forEach((row, i)=>{
    writePeriodRowBlock(back04, 'D', 'P', CONTINUATION_BACK_ROW_STARTS[i], row);
  });
}

// ===== 02裏面オプション出力：障害認定日頃の状況／障害者手帳（今回追加分） =====
// セル位置は実テンプレート（02.xlsx裏面）をopenpyxl/ExcelJSで直接検証して確定したもの。
// 「現在（請求日頃）」セクション（33-57行目、既存コードの書き込み先）と
// 「障害認定日頃」セクション（6-30行目）は、就労状況・ADL・自由記述まで含めて
// レイアウトが完全に一致し、行差27（現在側の行番号-27＝認定日側の行番号）で対応することを確認済み。
// 既存のADL_CELL_MAP／NOTWORK_REASON_MAP／NOTWORK_REASON_ROW／COMMUTE_TIME_TO_HMは
// 列定義（現在側の行番号込み）を保持しているため、ここでは行番号だけ-27したコピーを使う。
const RECOGNITION_ROW_OFFSET = 27;

function shiftAdlCellMap(map, offset){
  const shifted = {};
  Object.keys(map).forEach(key=>{
    const m = map[key];
    shifted[key] = [m[0], m[1], m[2], m[3], m[4] - offset];
  });
  return shifted;
}
function shiftRowMap(map, offset){
  const shifted = {};
  Object.keys(map).forEach(key=>{ shifted[key] = map[key] - offset; });
  return shifted;
}
const RECOGNITION_ADL_CELL_MAP = shiftAdlCellMap(ADL_CELL_MAP, RECOGNITION_ROW_OFFSET);
const RECOGNITION_NOTWORK_REASON_ROW = shiftRowMap(NOTWORK_REASON_ROW, RECOGNITION_ROW_OFFSET);
// 現在側のBC44（不就労理由「オ」のその他自由記述）に対応する認定日側セル＝BC17（44-27）
// 02.xlsx裏面row17の結合セル範囲はBB17:BX17（row44側のBC44:BZ44とは開始列が1つずれ、
// row17はBBが正しいマスターセル）。なおExcelJSは結合セルの非マスターセルへの書き込みも
// マスターセルへ自動転送するため、BC17指定でも実害は無かった（要検証・実セルで確認済み）。
// BBへの変更はコードの正確性のための修正であり、表示結果への影響は無い。
const RECOGNITION_OTHER_REASON_NOTE_CELL = 'BB' + (44 - RECOGNITION_ROW_OFFSET);
// 現在側AP55（その他不便、自由記述）に対応する認定日側セル＝AP28（55-27）
const RECOGNITION_OTHER_NOTE_CELL = 'AP' + (55 - RECOGNITION_ROW_OFFSET);

// ---- 障害認定日頃の状況を02裏面（6-30行目）へ書き込む。snap.enabled===falseなら何もしない ----
function writeRecognitionSnapshotToBack(back, snap){
  if(!snap || !snap.enabled) return;

  const work = snap.work || {};
  // ===== 就労状態（仕事をしていた／していなかった）の出力ガード =====
  // 「仕事をしていた」「仕事をしていなかった」は排他的な入力（stepCh5Recognition参照）。
  // UI側でstatus切替時に反対側のデータをクリアしているが、古い保存データの復元や
  // 直接state操作のケースに備え、出力側でも「statusに対応しない情報は書かない」ことを保証する
  // （UI側クリアと合わせた二重対策。片方だけでは古い保存データや将来の実装変更に弱い）。
  // status==='仕事をしていた' → 就労側情報のみ書く（不就労理由は書かない）
  // status==='仕事をしていなかった' → 不就労理由のみ書く（就労側情報は書かない）
  // status未選択(null/undefined) → どちらも書かない
  const shouldWriteWorkingInfo = work.status === '仕事をしていた';
  const shouldWriteNotWorkingInfo = work.status === '仕事をしていなかった';

  // 就労状況ブロック（職種・通勤方法・通勤時間・出勤日数・体調）。現在側AP33→認定日側AP6、他同様に-27。
  if(shouldWriteWorkingInfo){
    back.getCell('AP' + (33 - RECOGNITION_ROW_OFFSET)).value = work.jobType || '';
    back.getCell('AW' + (34 - RECOGNITION_ROW_OFFSET)).value = (work.commute||[]).join('・');
    const hm = COMMUTE_TIME_TO_HM[work.commuteTime];
    if(hm){
      back.getCell('BA' + (35 - RECOGNITION_ROW_OFFSET)).value = hm[0];
      back.getCell('BJ' + (35 - RECOGNITION_ROW_OFFSET)).value = hm[1];
    }
    back.getCell('BB' + (36 - RECOGNITION_ROW_OFFSET)).value = work.workDays || '';
    back.getCell('AP' + (37 - RECOGNITION_ROW_OFFSET)).value = (work.condition||[]).join('・');
  }

  // 仕事をしていない理由（チェック＋「オ」自由記述）
  if(shouldWriteNotWorkingInfo){
    const otherNoteParts = [];
    toLabelStrings(snap.notWorkReasons).forEach(reason=>{
      const letter = NOTWORK_REASON_MAP[reason] || 'オ';
      const row = RECOGNITION_NOTWORK_REASON_ROW[letter];
      back.getCell(`AO${row}`).value = 'レ';
      if(letter==='オ' && reason!=='その他') otherNoteParts.push(reason);
    });
    if(snap.notWorkReasons.includes('その他') && snap.notWorkReasonOther) otherNoteParts.push(snap.notWorkReasonOther);
    if(otherNoteParts.length) back.getCell(RECOGNITION_OTHER_REASON_NOTE_CELL).value = otherNoteParts.join('・');
  }

  // ADL（10項目、認定日時点）
  Object.keys(snap.adl||{}).forEach(key=>{
    const map = RECOGNITION_ADL_CELL_MAP[key];
    if(!map) return;
    const level = snap.adl[key];
    const num = ADL_LEVEL_TO_NUM[level];
    if(!num) return;
    const col = map[num-1];
    const row = map[4];
    back.getCell(`${col}${row}`).value = 'レ';
  });

  // その他日常生活で不便（自由記述）
  let otherText = toLabelStrings(snap.otherChips).join('・');
  if(snap.otherNote){ otherText = otherText ? (otherText + '／' + snap.otherNote) : snap.otherNote; }
  back.getCell(RECOGNITION_OTHER_NOTE_CELL).value = otherText;
}

// ---- 障害者手帳の情報を02裏面（58-65行目、1件目枠）へ書き込む。nb.enabled===falseなら何もしない ----
// セル位置（ExcelJSで実テンプレート確認・確定済み）：
//   受給有無「受けている」チェック   : AO59
//   種別チェック（身/精/療/他）     : AQ62(身) / AU62(精) / AY62(療) / BC62(他)

const NOTEBOOK_TYPE_CHECK_CELL = {

function writeDisabilityNotebookToBack(back, nb){
  if(!nb || !nb.enabled) return;

  // 受給有無：今回はenabled===trueを「受けている」として扱う（申請中／受けていない分岐は今回実装しない。GPT回答B1）
  back.getCell('AO59').value = 'レ';

  // 交付年月日（和暦変換。年のみ／年月／年月日のどこまで埋まっているかをacquiredKindで判定）
  if(nb.acquiredKind && nb.acquiredKind !== 'none' && nb.acquiredYear){

    if(nb.acquiredKind==='ymd' && nb.acquiredDay){

  if(disabilityNameText) back.getCell('AW64').value = disabilityNameText;

function esc(s){
  return (s===undefined||s===null?'':s).toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toggleArray(arr, val){
  const i = arr.indexOf(val);
  if(i>=0) arr.splice(i,1); else arr.push(val);
}
function makeFocusable(el, handler){
  el.tabIndex = 0;
  el.setAttribute('role','button');
  el.addEventListener('keydown', e=>{
    if(e.key==='Enter' || e.key===' '){ e.preventDefault(); handler(); }
  });
}
function badgeForConfidence(conf){
  if(conf==='certain') return '<span class="badge badge-good">資料で確認</span>';
  if(conf==='approximate') return '<span class="badge badge-warn">たぶん</span>';
  return '<span class="badge badge-neutral">覚えていない</span>';
}
function findEventLabel(id){
  const found = state.selectedEvents.find(ev=>ev.id===id);
  if(found) return found.label;
  // フォールバック：固定グループ内の項目名から探す（保険）
  for(const g of Object.keys(EVENT_GROUPS)){
    const f = EVENT_GROUPS[g].find(e=>e[0]===id);
    if(f) return f[1];
  }
  return id;
}

// ===== 年齢帯（ageBand）関連のユーティリティ =====
// 年齢帯は「出来事カードを配置するための見せ方」であり、通院カードの
// 内部データ（年月）はここでは変更しない。空白検出は通院カードの
// 年月同士の隙間から行う（computeGapsを参照）。

function getCurrentYear(){
  return new Date().getFullYear();
}

function getCurrentAge(){
  const birth = parseInt(state.profile.birthYear);
  if(!birth) return null;
  return getCurrentYear() - birth;
}

// 生年とbandSizeから、年齢帯のリストを生成する。
// 最後の帯は「現在まで」を含む可変長にする。
function buildAgeBands(){
  const birth = parseInt(state.profile.birthYear);
  const size = state.profile.bandSize || 5;
  const currentAge = getCurrentAge();
  if(!birth || currentAge===null) return [];
  const bands = [];
  let startAge = 0;
  while(startAge < currentAge){
    const endAge = Math.min(startAge + size, currentAge);
    const isLast = endAge >= currentAge;
    bands.push({
      startAge, endAge,
      startYear: birth + startAge,
      endYear: birth + endAge,
      label: isLast ? `${startAge}歳〜現在` : `${startAge}〜${endAge}歳ごろ`,
      isLast
    });
    startAge += size;
  }
  if(bands.length===0){
    bands.push({startAge:0, endAge:currentAge, startYear:birth, endYear:birth+currentAge, label:`0歳〜現在`, isLast:true});
  }
  return bands;
}

// 通院カード（年月）が、与えられた年齢帯と重なっているかを判定する。
// 表示用の手がかりとして使うだけで、空白検出には使わない。
function hospitalOverlapsBand(hospital, band){
  const fromYear = parseInt(hospital.fromYear);
  if(!fromYear) return false;
  const toYear = hospital.ongoing ? getCurrentYear() : (parseInt(hospital.toYear) || fromYear);
  return fromYear <= band.endYear && toYear >= band.startYear;
}

// 与えられた年齢帯に重なる通院カードの一覧を返す（手がかり表示用）。
function hospitalsInBand(band){
  return state.hospitals.filter(h=>hospitalOverlapsBand(h, band));
}

function renderChipGroup(containerId, items, selectedArr, multi, onToggle){
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  items.forEach(label=>{
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'chip' + (selectedArr.includes(label) ? ' chip-selected' : '');
    btn.textContent = label;
    btn.onclick = ()=>{
      if(multi){
        toggleArray(selectedArr, label);
        btn.classList.toggle('chip-selected');
      } else {
        container.querySelectorAll('.chip').forEach(c=>c.classList.remove('chip-selected'));
        btn.classList.add('chip-selected');
      }
      onToggle(label);
    };
    container.appendChild(btn);
  });
}

function renderCheckList(containerId, items, selectedEvents){
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  const isSelected = key => selectedEvents.some(ev=>ev.id===key);
  items.forEach(([key,label])=>{
    const row = document.createElement('div');
    row.className = 'check-row';
    const box = document.createElement('div');
    box.className = 'check-box' + (isSelected(key) ? ' on' : '');
    box.innerHTML = isSelected(key) ? '<span>&#10003;</span>' : '';
    const text = document.createElement('div');
    text.textContent = label;
    text.style.fontSize = '15px';
    row.appendChild(box);
    row.appendChild(text);
    const handler = ()=>{
      const idx = selectedEvents.findIndex(ev=>ev.id===key);
      if(idx>=0){ selectedEvents.splice(idx,1); }
      else { selectedEvents.push({id:key, type:key, label:label, repeatable:false}); }
      box.className = 'check-box' + (isSelected(key) ? ' on' : '');
      box.innerHTML = isSelected(key) ? '<span>&#10003;</span>' : '';
    };
    row.onclick = handler;
    makeFocusable(row, handler);
    container.appendChild(row);
  });
}

// ---- 文字列配列専用のチェックリスト（gapReasons / notWorkReasons / otherChips 用） ----
// renderCheckListはイベントカード（オブジェクト配列）専用なので、
// 単純な複数選択（文字列配列）はこちらを使う。役割を混ぜない。
// helpTexts: {label: helpText} の形のオブジェクトを渡すと、各行の下に薄い補助文を表示する（任意・省略可）。
// 既存呼び出し元（helpTextsを渡さないもの）の挙動は変えない。
function renderStringCheckList(containerId, items, selectedArr, helpTexts, onChange){
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  const isSelected = key => selectedArr.includes(key);
  items.forEach(([key,label])=>{
    const wrapper = document.createElement('div');
    const row = document.createElement('div');
    row.className = 'check-row';
    const box = document.createElement('div');
    box.className = 'check-box' + (isSelected(key) ? ' on' : '');
    box.innerHTML = isSelected(key) ? '<span>&#10003;</span>' : '';
    const text = document.createElement('div');
    text.textContent = label;
    text.style.fontSize = '15px';
    row.appendChild(box);
    row.appendChild(text);
    const handler = ()=>{
      const idx = selectedArr.indexOf(key);
      if(idx>=0){ selectedArr.splice(idx,1); }
      else { selectedArr.push(key); }
      box.className = 'check-box' + (isSelected(key) ? ' on' : '');
      box.innerHTML = isSelected(key) ? '<span>&#10003;</span>' : '';
      if(onChange) onChange(key, isSelected(key));
    };
    row.onclick = handler;
    makeFocusable(row, handler);
    wrapper.appendChild(row);
    if(helpTexts && helpTexts[key]){
      const help = document.createElement('p');
      help.className = 'small';
      help.style.margin = '2px 0 10px 32px';
      help.textContent = helpTexts[key];
      wrapper.appendChild(help);
    }
    container.appendChild(wrapper);
  });
}

// 折りたたみにはHTML標準のdetails/summaryを使い、開閉状態をstateで管理する必要がない
// （選択値の保存・出力ロジックには一切影響しない、表示のみの機能）。

function getChapterNum(stepId){
  if(stepId.indexOf('ch1')===0) return 1;
  if(stepId.indexOf('ch2')===0) return 2;
  if(stepId.indexOf('ch3')===0) return 3;
  if(stepId.indexOf('ch4')===0) return 4;
  if(stepId.indexOf('ch5')===0) return 5;
  return 0;
}

function renderTasks(){
  const header = document.getElementById('taskHeader');
  const num = getChapterNum(current);
  if(num===0){ header.innerHTML=''; return; }
  let html = `<div class="small">現在：第${num}章 ${CH_LABELS[num-1]}</div><div class="task-list">`;
  CH_LABELS.forEach((label,i)=>{
    const n = i+1;
    let cls = 'task-pill';
    let prefix = '';
    if(n===num){ cls += ' active'; prefix='● '; }
    else if(state.completed['ch'+n]){ cls += ' done'; prefix='&#10003; '; }
    html += `<div class="${cls}">${prefix}${label}</div>`;
  });
  html += '</div>';
  header.innerHTML = html;
}

function goTo(id){
  historyStack.push(current);
  current = id;
  showScreen();
  window.scrollTo(0,0);
  saveStateToStorage();
}
// 章の完了後、returnToが設定されていればch5_doneに戻る共通処理
function finishChapter(chKey, nextScreen){
  state.completed[chKey] = true;
  if(state.returnTo){
    const dest = state.returnTo;
    state.returnTo = null;
    goTo(dest);
  } else {
    goTo(nextScreen);
  }
}
function goBack(){
  if(historyStack.length){
    current = historyStack.pop();
    showScreen();
    window.scrollTo(0,0);
    saveStateToStorage();
  }
}
// 個人情報は端末保存のみ／サーバー送信なしの要件に沿い、ブラウザのlocalStorageのみを使う。
const STORAGE_KEY = 'shinritsusho_draft_v1';

// 各章の「次へ」で画面遷移した瞬間（goTo呼び出し時）に保存する。
// 保存に失敗しても操作は止めない（例：プライベートブラウジング等でlocalStorageが使えない場合）。
function saveStateToStorage(){
  try{
    const payload = { state: state, current: current, historyStack: historyStack, savedAt: Date.now() };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  }catch(err){
    console.warn('保存に失敗しました（端末の保存領域が使えない可能性があります）', err);
  }
}

function loadStateFromStorage(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const payload = JSON.parse(raw);
    if(!payload || !payload.state) return null;
    // 過去編state追加（または将来の追加項目）に対する移行処理を必ず通す。
    // 既存フィールドは上書きせず、無いキーのみ補う（migrateAppState内部の原則）。
    payload.state = migrateAppState(payload.state);
    return payload;
  }catch(err){
    console.warn('保存データの読み込みに失敗しました', err);
    return null;
  }
}

function clearStateStorage(){
  try{
    localStorage.removeItem(STORAGE_KEY);
  }catch(err){
    console.warn('保存データの削除に失敗しました', err);
  }
}

// 起動時：保存データがあれば「続きから / 最初から」の確認画面を出す。

function stepResumeCheck(savedPayload){
  const savedDate = new Date(savedPayload.savedAt);
  const dateLabel = `${savedDate.getFullYear()}年${savedDate.getMonth()+1}月${savedDate.getDate()}日 ${String(savedDate.getHours()).padStart(2,'0')}:${String(savedDate.getMinutes()).padStart(2,'0')}`;
  document.getElementById('screen').innerHTML = `
    <div class="card center">
      <h1>前回の続きがあります</h1>
      <p class="lead">この端末に、前回入力した内容が保存されています（${esc(dateLabel)}時点）。続きから再開しますか？</p>
    </div>`;
  setFooter({
    secondaryLabel:'最初からやり直す',
    secondaryFn:()=>{
      clearStateStorage();
      resetState();
      current = 'start';
      showScreen();
    },
    primaryLabel:'続きから再開する',
    primaryEnabled:true,
    primaryFn:()=>{
      // savedPayload.state は loadStateFromStorage() の時点で
      // migrateAppState() を通過済み（過去編キー等の不足分は補完されている）
      state = savedPayload.state;
      historyStack = savedPayload.historyStack || [];
      current = savedPayload.current || 'start';
      showScreen();
    }
  });
}

  return CIRCLED_NUMBERS[n-1] || `(${n})`;

function bindRepeatableListEvents(){
  document.querySelectorAll('[data-add-type]').forEach(btn=>{
    btn.onclick = ()=>{
      const type = btn.getAttribute('data-add-type');
      const label = btn.getAttribute('data-add-label');
      const count = state.selectedEvents.filter(ev=>ev.type===type).length + 1;
      state.selectedEvents.push({id:`${type}_${Date.now()}_${count}`, type, label:`${label}${circledNumber(count)}`, repeatable:true});
      stepCh3Events();
    };
  });
  document.querySelectorAll('[data-remove-id]').forEach(btn=>{
    btn.onclick = ()=>{
      const id = btn.getAttribute('data-remove-id');
      const idx = state.selectedEvents.findIndex(ev=>ev.id===id);
      if(idx>=0) state.selectedEvents.splice(idx,1);
      // 配置情報も削除しておく（存在しないカードの配置が残らないように）
      delete state.eventPlacements[id];
      stepCh3Events();
    };
  });

// 出来事idの配列（relatedEventsなど）を対象にしたチェックリスト。
// renderCheckListはselectedEvents（オブジェクト配列）専用なので、用途が異なるこちらを使う。
function renderIdCheckList(containerId, items, selectedIds){
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  items.forEach(([id,label])=>{
    const row = document.createElement('div');
    row.className = 'check-row';
    const box = document.createElement('div');
    box.className = 'check-box' + (selectedIds.includes(id) ? ' on' : '');
    box.innerHTML = selectedIds.includes(id) ? '<span>&#10003;</span>' : '';
    const text = document.createElement('div');
    text.textContent = label;
    text.style.fontSize = '15px';
    row.appendChild(box);
    row.appendChild(text);
    const handler = ()=>{
      toggleArray(selectedIds, id);
      box.className = 'check-box' + (selectedIds.includes(id) ? ' on' : '');
      box.innerHTML = selectedIds.includes(id) ? '<span>&#10003;</span>' : '';
    };
    row.onclick = handler;
    makeFocusable(row, handler);
    container.appendChild(row);
  });
}
