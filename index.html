<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>申立書サポート（試作・第1〜5章）</title>
<style>
:root{
  --bg:#F4F2EC;
  --card:#FFFFFF;
  --ink:#2B2B28;
  --ink-soft:#6B6B63;
  --line:#E2DDD0;
  --accent:#4F7A6B;
  --accent-soft:#E4EDE8;
  --accent-strong:#345A4C;
  --warn:#B8742E;
  --warn-soft:#F6E8D8;
  --danger:#A3402F;
  --danger-soft:#F5E1DB;
  --good:#3E7D4C;
  --good-soft:#E3F0E3;
  --neutral-soft:#EFEBE2;
}
*{box-sizing:border-box;}
body{
  margin:0;background:var(--bg);
  font-family:"Hiragino Sans","Noto Sans JP",system-ui,-apple-system,sans-serif;
  color:var(--ink);line-height:1.7;
}
#app-shell{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
header.tasks{padding:16px 20px 4px;}
.task-list{display:flex;gap:6px;margin-top:8px;}
.task-pill{flex:1;text-align:center;font-size:11px;padding:6px 4px;border-radius:8px;background:var(--card);border:1px solid var(--line);color:var(--ink-soft);}
.task-pill.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-strong);font-weight:500;}
.task-pill.done{color:var(--good);}
main{flex:1;padding:8px 20px 24px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px 20px;}
h1{font-size:20px;font-weight:500;margin:0 0 8px;}
h2{font-size:17px;font-weight:500;margin:0 0 12px;}
.card-name-label{font-size:13px;color:var(--ink-soft);margin:0 0 4px;}
.card-name-big{font-size:24px;font-weight:500;color:var(--accent-strong);margin:0 0 4px;line-height:1.4;}
.card-name-sub{font-size:14px;color:var(--ink-soft);margin:0 0 20px;}
p.lead{color:var(--ink-soft);font-size:14px;margin:0 0 20px;}
.hint{background:var(--accent-soft);color:var(--accent-strong);font-size:13px;padding:10px 14px;border-radius:10px;margin:12px 0;}
.chip-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.chip{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:8px 14px;font-size:14px;color:var(--ink);cursor:pointer;}
.chip-selected{background:var(--accent);border-color:var(--accent);color:#fff;}
.option-block{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.option{border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-size:15px;cursor:pointer;background:var(--card);}
.option.selected{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-strong);font-weight:500;}
label.field-label{display:block;font-size:13px;color:var(--ink-soft);margin:16px 0 6px;}
input[type=text],input[type=number]{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#fff;color:var(--ink);}
textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;min-height:80px;font-family:inherit;}
.row{display:flex;gap:10px;}
.row > *{flex:1;}
.adl-item{margin-bottom:18px;}
.adl-label{font-size:14px;margin-bottom:8px;}
.adl-options .chip{font-size:12px;padding:7px 10px;}
.check-row{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;}
.check-box{width:18px;height:18px;border:1px solid var(--line);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;}
.check-box.on{background:var(--accent);}
.check-box span{color:#fff;font-size:12px;}
.footer-nav{position:sticky;bottom:0;background:linear-gradient(to top, var(--bg) 75%, transparent);padding:16px 20px 20px;display:flex;gap:10px;max-width:480px;margin:0 auto;width:100%;}
button.btn{flex:1;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:500;cursor:pointer;}
button.btn-primary{background:var(--accent);color:#fff;}
button.btn-primary:disabled{background:#C9C4B6;cursor:not-allowed;}
button.btn-secondary{background:var(--card);border:1px solid var(--line);color:var(--ink);}
.timeline-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px;}
.timeline-row.gap{color:var(--ink-soft);border-bottom:1px dashed var(--line);font-style:italic;}
.badge{font-size:12px;padding:3px 10px;border-radius:999px;white-space:nowrap;}
.badge-good{background:var(--good-soft);color:var(--good);}
.badge-warn{background:var(--warn-soft);color:var(--warn);}
.badge-danger{background:var(--danger-soft);color:var(--danger);}
.badge-neutral{background:var(--neutral-soft);color:var(--ink-soft);}
.center{text-align:center;}
.small{font-size:13px;color:var(--ink-soft);}
.link-btn{background:none;border:none;color:var(--accent-strong);font-size:14px;text-decoration:underline;cursor:pointer;padding:0;display:block;margin-top:4px;}
button:focus-visible, .option:focus-visible, .chip:focus-visible, [role="button"]:focus-visible{outline:2px solid var(--accent-strong);outline-offset:2px;}
.edit-section{margin-top:24px;padding-top:16px;border-top:1px solid var(--border);}
.edit-section-label{font-size:12px;color:var(--ink-soft);margin:0 0 10px;}
.edit-section-grid{display:flex;flex-wrap:wrap;gap:8px;}
.edit-chip{background:var(--surface-raised);border:1px solid var(--border);border-radius:999px;font-size:13px;padding:6px 14px;cursor:pointer;color:var(--ink);}
.repeat-block{border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.repeat-block-head{display:flex;align-items:center;justify-content:space-between;}
.repeat-block-title{font-size:15px;}
.repeat-add{background:none;border:1px solid var(--accent-strong);color:var(--accent-strong);border-radius:999px;font-size:13px;padding:4px 12px;cursor:pointer;}
.repeat-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding:8px 10px;background:var(--surface-raised);border-radius:8px;font-size:14px;}
.repeat-remove{background:none;border:none;color:var(--danger);font-size:13px;cursor:pointer;text-decoration:underline;padding:0;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
</head>
<body>
<div id="app-shell">
  <header class="tasks" id="taskHeader"></header>
  <main id="screen"></main>
  <div class="footer-nav" id="footerNav"></div>
</div>

// ---- 西暦→和暦変換（簡易版） ----
function yearToWareki(year){
  if(year===null || year===undefined || isNaN(year)) return [null, null];
  if(year >= 2019) return ['令和', year - 2018];
  if(year >= 1989) return ['平成', year - 1988];
  if(year >= 1926) return ['昭和', year - 1925];
  return [null, null];
}

// ---- 様式記入時点（出力ボタンを押した「今日」） ----
function getFormFillDate(){
  const now = new Date();
  return {year: now.getFullYear(), month: now.getMonth()+1, day: now.getDate()};
}

// ---- 出来事カードの年範囲（年齢帯→年）を作る。状況欄の参考情報用 ----
function buildEventYearRanges(){
  const bands = buildAgeBands();
  const ranges = [];
  state.selectedEvents.forEach(ev=>{
    const placement = state.eventPlacements[ev.id];
    if(!placement || placement==='unknown') return;
    const band = bands[placement.bandIndex];
    if(!band) return;
    ranges.push({startYear:band.startYear, endYear:band.endYear, label:ev.label});
  });
  return ranges;
}

// ---- 通院記録＋通院空白を様式の「期間」配列に変換（最大5件、6件目以降は今回未対応） ----
function buildPeriodsForForm(){
  const eventRanges = buildEventYearRanges();
  const periods = [];

  state.hospitals.forEach(h=>{
    const fromY = parseInt(h.fromYear) || null;
    const fromM = parseInt(h.fromMonth) || null;
    let toY, toM, toIsNow = false;
    if(h.ongoing){
      const fillDate = getFormFillDate();
      toY = fillDate.year; toM = fillDate.month; toIsNow = true;
    } else {
      toY = parseInt(h.toYear) || null;
      toM = parseInt(h.toMonth) || null;
    }
    const related = eventRanges.filter(r => fromY && r.startYear <= fromY && fromY <= r.endYear).map(r=>r.label);
    const hospitalName = h.nameUnknown ? '' : (h.name || '');
    const noteParts = [];
    noteParts.push(`${h.hospitalType || ''}${hospitalName || '（病院名不明）'}に通院。`);
    if(toIsNow) noteParts.push('現在も通院中。');
    if(related.length) noteParts.push('この頃の出来事：' + related.join('・') + '。');
    periods.push({
      sortKey: fromY || 0,
      fromY, fromM, toY, toM, toIsNow,
      visited: true,
      hospitalName,
      note: noteParts.join('')
    });
  });

  computeGaps().forEach(g=>{
    const fm = (g.fromLabel||'').match(/(\d+)年(\d+)?/);
    const tm = (g.toLabel||'').match(/(\d+)年(\d+)?/);
    const fromY = fm ? parseInt(fm[1]) : null;
    const related = eventRanges.filter(r => fromY && r.startYear <= fromY && fromY <= r.endYear).map(r=>r.label);
    const noteParts = ['通院せず。理由：' + toLabelStrings(g.reasons).join('・') + '。'];
    if(related.length) noteParts.push('この頃の出来事：' + related.join('・') + '。');
    periods.push({
      sortKey: fromY || 0,
      fromY, fromM: fm && fm[2] ? parseInt(fm[2]) : null,
      toY: tm ? parseInt(tm[1]) : null, toM: tm && tm[2] ? parseInt(tm[2]) : null,
      toIsNow: false,
      visited: false,
      hospitalName: '',
      note: noteParts.join('')
    });
  });

  periods.sort((a,b)=>a.sortKey - b.sortKey);
  return periods.slice(0, 5); // 表面1枚分（5期間）まで。6件目以降は将来04.xlsx対応で
}

// ---- 保険：文字列配列であるべき項目に古いオブジェクト配列データが残っていた場合の正規化 ----
// 文字列はそのまま使う。オブジェクトなら label を使う。それ以外は捨てる。
// 主修正はUI入力側（renderStringCheckList）。これはあくまで後方互換の保険。
function toLabelStrings(arr){
  if(!Array.isArray(arr)) return [];
  return arr.map(item=>{
    if(typeof item === 'string') return item;
    if(item && typeof item === 'object' && typeof item.label === 'string') return item.label;
    return null;
  }).filter(v=>v!==null);
}

// ---- base64文字列をArrayBufferに変換 ----
function base64ToArrayBuffer(base64){
  const binaryString = atob(base64);
  const len = binaryString.length;
  const bytes = new Uint8Array(len);
  for(let i=0;i<len;i++){ bytes[i] = binaryString.charCodeAt(i); }
  return bytes.buffer;
}

// ---- メイン：02.xlsx様式に値を差し込んでダウンロードする ----
async function exportToOfficialForm(){
  if(typeof ExcelJS === 'undefined'){
    // ここでalertして握りつぶすと、呼び出し元（stepCh5Done）が「成功」とみなしてしまう。
    // 失敗として呼び出し元のcatchに伝え、ボタン側で失敗メッセージ・再試行可能な状態に戻す。
    throw new Error('ExcelJSライブラリの読み込みが完了していません。もう一度お試しください。');
  }

  const buffer = base64ToArrayBuffer(TEMPLATE_02_XLSX_BASE64);
  const wb = new ExcelJS.Workbook();
  await wb.xlsx.load(buffer);

  const front = wb.getWorksheet('表');
  const back = wb.getWorksheet('裏');

  // ---- 表面：傷病名・発病日・初診日 ----
  // 現状モックには「傷病名」「発病日」「初診日」を直接聞く項目がないため、
  // 入力があれば反映、なければ空欄のままにする（将来ヒアリング項目を追加予定）
  if(state.byomei) front.getCell('M3').value = state.byomei;
  if(state.onset && state.onset.year){
    const [g,y] = yearToWareki(state.onset.year);
    front.getCell('H4').value = g;
    front.getCell('N4').value = y;
    front.getCell('Q4').value = state.onset.month || '';
  }
  if(state.firstVisit && state.firstVisit.year){
    const [g,y] = yearToWareki(state.firstVisit.year);
    front.getCell('AB4').value = g;
    front.getCell('AH4').value = y;
    front.getCell('AK4').value = state.firstVisit.month || '';
  }

  // ---- 表面：期間1〜5 ----
  const periods = buildPeriodsForForm();
  const baseRows = [18,23,28,33,38];
  periods.forEach((period, i)=>{
    if(i >= baseRows.length) return;
    const r0 = baseRows[i];
    const r1 = r0 + 1;

    const [g1,y1] = yearToWareki(period.fromY);
    front.getCell(`E${r0}`).value = g1;
    front.getCell(`J${r0}`).value = y1;
    front.getCell(`L${r0}`).value = period.fromM;

    const [g2,y2] = yearToWareki(period.toY);
    front.getCell(`E${r1}`).value = g2;
    front.getCell(`J${r1}`).value = y2;
    front.getCell(`L${r1}`).value = period.toM;
    if(period.toIsNow){
      const fillDate = getFormFillDate();
      front.getCell(`N${r1}`).value = fillDate.day;
    }

    const checkRow = r0 + 2;
    if(period.visited){ front.getCell(`F${checkRow}`).value = 'レ'; }
    else { front.getCell(`K${checkRow}`).value = 'レ'; }

    const nameRow = r0 + 4;
    front.getCell(`E${nameRow}`).value = period.hospitalName;

    front.getCell(`R${r0+1}`).value = period.note;
  });

  // ---- 裏面：現在（請求日頃）の就労状況 ----
  const work = state.work || {};
  back.getCell('AP33').value = work.jobType || '';
  back.getCell('AW34').value = (work.commute||[]).join('・');
  const hm = COMMUTE_TIME_TO_HM[work.commuteTime];
  if(hm){
    back.getCell('BA35').value = hm[0];
    back.getCell('BJ35').value = hm[1];
  }
  back.getCell('BB36').value = work.workDays || '';
  back.getCell('AP37').value = (work.condition||[]).join('・');

  // 仕事をしていない理由
  const otherNoteParts = [];
  toLabelStrings(state.notWorkReasons).forEach(reason=>{
    const letter = NOTWORK_REASON_MAP[reason] || 'オ';
    const row = NOTWORK_REASON_ROW[letter];
    back.getCell(`AO${row}`).value = 'レ';
    if(letter==='オ' && reason!=='その他') otherNoteParts.push(reason);
  });
  if(otherNoteParts.length) back.getCell('BC44').value = otherNoteParts.join('・');

  // ADL（10項目、現在セクション）
  Object.keys(state.adl||{}).forEach(key=>{
    const map = ADL_CELL_MAP[key];
    if(!map) return;
    const level = state.adl[key];
    const num = ADL_LEVEL_TO_NUM[level];
    if(!num) return;
    const col = map[num-1];
    const row = map[4];
    back.getCell(`${col}${row}`).value = 'レ';
  });

  // その他日常生活で不便（自由記述）
  let otherText = toLabelStrings(state.otherChips).join('・');
  if(state.otherNote){ otherText = otherText ? (otherText + '／' + state.otherNote) : state.otherNote; }
  back.getCell('AP55').value = otherText;

  // ---- ファイル出力 ----
  const outBuffer = await wb.xlsx.writeBuffer();
  const blob = new Blob([outBuffer], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '病歴・就労状況等申立書.xlsx';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ===== 年齢帯（ageBand）関連のユーティリティ =====
// 年齢帯は「出来事カードを配置するための見せ方」であり、通院カードの
// 内部データ（年月）はここでは変更しない。空白検出は通院カードの
// 年月同士の隙間から行う（computeGapsを参照）。

function getCurrentYear(){
  return new Date().getFullYear();
}

function getCurrentAge(){
  const birth = parseInt(state.profile.birthYear);
  if(!birth) return null;
  return getCurrentYear() - birth;
}

// 生年とbandSizeから、年齢帯のリストを生成する。
// 最後の帯は「現在まで」を含む可変長にする。
function buildAgeBands(){
  const birth = parseInt(state.profile.birthYear);
  const size = state.profile.bandSize || 5;
  const currentAge = getCurrentAge();
  if(!birth || currentAge===null) return [];
  const bands = [];
  let startAge = 0;
  while(startAge < currentAge){
    const endAge = Math.min(startAge + size, currentAge);
    const isLast = endAge >= currentAge;
    bands.push({
      startAge, endAge,
      startYear: birth + startAge,
      endYear: birth + endAge,
      label: isLast ? `${startAge}歳〜現在` : `${startAge}〜${endAge}歳ごろ`,
      isLast
    });
    startAge += size;
  }
  if(bands.length===0){
    bands.push({startAge:0, endAge:currentAge, startYear:birth, endYear:birth+currentAge, label:`0歳〜現在`, isLast:true});
  }
  return bands;
}

// 通院カード（年月）が、与えられた年齢帯と重なっているかを判定する。
// 表示用の手がかりとして使うだけで、空白検出には使わない。
function hospitalOverlapsBand(hospital, band){
  const fromYear = parseInt(hospital.fromYear);
  if(!fromYear) return false;
  const toYear = hospital.ongoing ? getCurrentYear() : (parseInt(hospital.toYear) || fromYear);
  return fromYear <= band.endYear && toYear >= band.startYear;
}

// 与えられた年齢帯に重なる通院カードの一覧を返す（手がかり表示用）。
function hospitalsInBand(band){
  return state.hospitals.filter(h=>hospitalOverlapsBand(h, band));
}

// 個人情報は端末保存のみ／サーバー送信なしの要件に沿い、ブラウザのlocalStorageのみを使う。
const STORAGE_KEY = 'shinritsusho_draft_v1';

// 各章の「次へ」で画面遷移した瞬間（goTo呼び出し時）に保存する。
// 保存に失敗しても操作は止めない（例：プライベートブラウジング等でlocalStorageが使えない場合）。
function saveStateToStorage(){
  try{
    const payload = { state: state, current: current, historyStack: historyStack, savedAt: Date.now() };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  }catch(err){
    console.warn('保存に失敗しました（端末の保存領域が使えない可能性があります）', err);
  }
}

function loadStateFromStorage(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const payload = JSON.parse(raw);
    if(!payload || !payload.state) return null;
    return payload;
  }catch(err){
    console.warn('保存データの読み込みに失敗しました', err);
    return null;
  }
}

function clearStateStorage(){
  try{
    localStorage.removeItem(STORAGE_KEY);
  }catch(err){
    console.warn('保存データの削除に失敗しました', err);
  }
}

        state.work.jobType = '';
        state.work.commute = [];
        state.work.commuteTime = null;
        state.work.workDays = '';
        state.work.condition = [];
        state.notWorkReasons = [];
        state.workStatusJustChanged = true;
      }
      state.workStatusAtCh2Entry = state.work.status;
      finishChapter('ch1', 'ch2_intro');
    }
  });
}

// ---- 通院記録から、毎回その場で通院空白（ギャップ）を計算する ----
// 保存するのはユーザーが入力した「理由」だけ（state.gapReasonsByKey）。
// 期間そのものは常にhospitalsから導出するので、病院を後から追加・修正・削除しても自動的に追従する。
function computeGaps(){
  const sorted = [...state.hospitals]
    .filter(h=>h.fromYear) // 年が入っていない記録は並べ替え対象から除外（フォールバック）
    .sort((a,b)=> (parseInt(a.fromYear)||0) - (parseInt(b.fromYear)||0));
  const gaps = [];
  for(let i=0;i<sorted.length-1;i++){
    const older = sorted[i];
    const newer = sorted[i+1];
    const olderToY = older.ongoing ? null : parseInt(older.toYear);
    const newerFromY = parseInt(newer.fromYear);
    if(olderToY && newerFromY && (newerFromY - olderToY) >= 1){
      const key = `${older.hospitalId}__${newer.hospitalId}`;
      gaps.push({
        key,
        fromLabel: `${older.toYear || '?'}年${older.toMonth || ''}頃`,
        toLabel: `${newer.fromYear || '?'}年${newer.fromMonth || ''}頃`,
        reasons: state.gapReasonsByKey[key] || []
      });
    }
  }
  return gaps;
}

// ---- 「理由が入力済みか」の判定ルール（この基準で全体を統一する） ----
// gapReasonsByKey[key] が存在し、かつ1件以上の理由が入っている場合のみ「入力済み」。
// undefined、もしくは空配列の場合は「未入力」として扱う。
function isGapReasonAnswered(key){
  const reasons = state.gapReasonsByKey[key];
  return Array.isArray(reasons) && reasons.length > 0;
}

// 理由が未入力のgapを先頭から1件だけ返す（なければnull）。
// 一覧を同時に編集させる方式ではなく、必ず1件ずつ確認させるための入口。
function findFirstUnansweredGap(){
  const gaps = computeGaps();
  return gaps.find(g => !isGapReasonAnswered(g.key)) || null;
}

// ---- 通院空白確認フェーズ（第4章B） ----
// 1画面で1gapだけを処理する。保存したら次の未入力gapを再取得して同じ画面にとどまり、
// 未入力gapがなくなった時点でch4_summaryに戻る（afterGapReviewActionが'go_ch5'なら続けて第5章へ）。
function stepCh4GapReview(){
  const target = findFirstUnansweredGap();
  if(!target){
    // 未入力gapがもうない＝確認完了。フラグに応じて第5章へ進むか、summaryに戻るだけ
    const action = state.afterGapReviewAction;
    state.afterGapReviewAction = null;
    if(action === 'go_ch5'){
      finishChapter('ch4', 'ch5_intro');
    } else {
      goTo('ch4_summary');
    }
    return;
  }
  const gaps = computeGaps();
  const remainingCount = gaps.filter(g => !isGapReasonAnswered(g.key)).length;
  const progressHtml = remainingCount > 1
    ? `<p class="small" style="margin:-4px 0 10px;">通院していない期間が複数見つかりました。あと${remainingCount}件、順番にお聞きします。</p>`
    : '';
  document.getElementById('screen').innerHTML = `
    <div class="card">
      ${progressHtml}
      <p class="hint">${esc(target.fromLabel)} から ${esc(target.toLabel)} までの間は、通院の記録がありませんでした。</p>
      <h2>この時期のことを少し教えてください</h2>
      <div id="gapReasons"></div>
      <p class="small" style="margin-top:14px;">どんな理由も審査の参考になります。正直に選んで大丈夫です。</p>
    </div>`;
  state.tempGapReasons = [...(state.gapReasonsByKey[target.key] || [])];
  renderStringCheckList('gapReasons', GAP_REASONS.map(l=>[l,l]), state.tempGapReasons);
  setFooter({secondaryLabel:'戻る', secondaryFn:goBack, primaryLabel:'次へ', primaryEnabled:true, primaryFn:()=>{
    state.gapReasonsByKey[target.key] = [...state.tempGapReasons];
    state.tempGapReasons = [];
    // この画面にとどまったまま再描画し、次の未入力gapを探す（一覧を一括編集する形にはしない）
    stepCh4GapReview();
  }});
}


function stepCh4Summary(){
  const orderedIdx = [...state.hospitals.keys()].reverse();
  const combined = [];
  orderedIdx.forEach(idx=>{
    const h = state.hospitals[idx];
    combined.push({type:'hospital', sortKey: parseInt(h.fromYear) || 0, data:h});
  });
  const gaps = computeGaps();
  gaps.forEach(g=>{
    const m = (g.fromLabel || '').match(/\d+/);
    const y = m ? parseInt(m[0]) : 0;
    combined.push({type:'gap', sortKey: y + 0.5, data:g});
  });
  combined.sort((a,b)=>a.sortKey - b.sortKey);
  const rowsHtml = combined.map(item=>{
    if(item.type==='hospital'){
      const h = item.data;
      const fromLabel = `${h.fromYear || '?'}年${h.fromMonth || ''}`;
      const toLabel = h.ongoing ? '現在' : `${h.toYear || '?'}年${h.toMonth || ''}`;
      const name = h.nameUnknown ? `（病院名不明・${esc(h.hospitalType) || '種類不明'}）` : (esc(h.name) || '（未入力）');
      const relatedNote = (h.relatedEvents && h.relatedEvents.length)
        ? `<div class="small" style="margin-top:-6px;margin-bottom:8px;">手がかり：${h.relatedEvents.map(k=>esc(findEventLabel(k))).join('・')}</div>`
        : '';
      return `<div class="timeline-row"><span>${fromLabel}〜${toLabel}　${name}</span>${badgeForConfidence(h.confidence)}</div>${relatedNote}<button type="button" class="link-btn" data-edit-hospital="${h.hospitalId}" style="margin:-4px 0 8px;">この通院記録を修正する →</button>`;
    }
    const g = item.data;
    const answered = isGapReasonAnswered(g.key);
    const statusBadge = answered
      ? '<span class="badge badge-good">理由を確認済み</span>'
      : '<span class="badge badge-warn">理由が未確認</span>';
    return `<div class="timeline-row gap"><span>${esc(g.fromLabel)}〜${esc(g.toLabel)}は、通院していない時期です</span>${statusBadge}</div>`;
  }).join('');

  const unansweredCount = gaps.filter(g=>!isGapReasonAnswered(g.key)).length;
  const gapStatusHtml = gaps.length===0
    ? ''
    : (unansweredCount > 0
        ? `<p class="hint" style="margin-top:12px;">通院していない時期が${gaps.length}件見つかりました。そのうち${unansweredCount}件、まだ理由を確認していません。</p>`
        : `<p class="small" style="margin-top:12px;color:var(--accent-strong);">通院していない時期について、理由の確認が済んでいます。</p>`);

  document.getElementById('screen').innerHTML = `
    <div class="card">
      <h2>通院の記録が集まりました</h2>
      ${rowsHtml || '<p class="small">記録がありません</p>'}
      ${gapStatusHtml}
      <div class="edit-section" style="margin-top:18px;">
        <button type="button" id="addHospitalBtn" style="width:100%;padding:12px;border-radius:8px;border:1px solid var(--accent-strong);background:#fff;color:var(--accent-strong);font-size:15px;cursor:pointer;margin-bottom:10px;">病院を追加する</button>
        ${gaps.length>0 ? `<button type="button" id="reviewGapsBtn" style="width:100%;padding:12px;border-radius:8px;border:none;background:${unansweredCount>0 ? 'var(--accent-strong)' : '#fff'};color:${unansweredCount>0 ? '#fff' : 'var(--accent-strong)'};${unansweredCount===0 ? 'border:1px solid var(--accent-strong);' : ''}font-size:15px;cursor:pointer;margin-bottom:10px;">この内容で通院空白を確認する</button>` : ''}
      </div>
    </div>`;
  document.querySelectorAll('[data-edit-hospital]').forEach(btn=>{
    btn.onclick = ()=>{
      const id = parseInt(btn.getAttribute('data-edit-hospital'));
      const h = state.hospitals.find(h=>h.hospitalId===id);
      state.editingHospitalId = id;
      state.draft = {...h};
      goTo('ch4_hospital_name');
    };
  });
  document.getElementById('addHospitalBtn').onclick = ()=>{
    state.draft = {};
    state.editingHospitalId = null;
    goTo('ch4_hospital_name');
  };
  const reviewBtn = document.getElementById('reviewGapsBtn');
  if(reviewBtn){
    reviewBtn.onclick = ()=>{
      state.afterGapReviewAction = null; // summaryから入った場合は確認後summaryに戻るだけでよい
      goTo('ch4_gap_review');
    };
  }
  setFooter({secondaryLabel:'戻る', secondaryFn:goBack, primaryLabel:'第5章へ進む', primaryEnabled:true, primaryFn:()=>{
    // 理由未入力のgapが残っている場合は、第5章へ直接進めず、確認を済ませてから進める
    if(findFirstUnansweredGap()){
      state.afterGapReviewAction = 'go_ch5';
      goTo('ch4_gap_review');
      return;
    }
    finishChapter('ch4','ch5_intro');
  }});
}

function stepCh5Intro(){
  document.getElementById('screen').innerHTML = `
    <div class="card">
      <h2>出来事を年表に置いてみましょう</h2>
      <p class="lead">これまでに選んだ出来事を、年齢の目安をもとに、だいたいの時期に置いていきます。通院の記録があれば、近い時期の手がかりとして表示されます。</p>
    </div>`;
  setFooter({secondaryLabel:'戻る', secondaryFn:goBack, primaryLabel:'はじめる', primaryEnabled:true, primaryFn:()=>goTo('ch5_place')});
}

function buildBandCardLabel(band){
  const hs = hospitalsInBand(band);
  if(hs.length===0) return '';
  const names = hs.map(h=>h.nameUnknown ? `（${h.hospitalType || '病院名不明'}）` : (h.name || '（未入力）'));
  return `通院：${names.join('・')}`;
}

function stepCh5Place(){
  const bands = buildAgeBands();
  const placedKeys = new Set(Object.keys(state.eventPlacements));
  const unplaced = state.selectedEvents.filter(ev=>!placedKeys.has(ev.id));

  if(unplaced.length===0){
    const hasEvents = state.selectedEvents.length > 0;
    document.getElementById('screen').innerHTML = `
      <div class="card">
        <h2>${hasEvents ? '出来事はすべて配置できました' : '配置する出来事はありません'}</h2>
        <p class="lead">${hasEvents ? 'お疲れさまでした。次は年表を確認しましょう。' : '出来事が選択されていないため、このまま次に進みます。'}</p>
      </div>`;
    setFooter({secondaryLabel:'戻る', secondaryFn:goBack, primaryLabel:'次へ', primaryEnabled:true, primaryFn:()=>{ state.completed.ch5 = true; goTo('ch5_done'); }});
    return;
  }

  const eventObj = unplaced[0];
  const key = eventObj.id;
  let html = `
    <div class="card">
      <p class="card-name-label">この出来事は、いつ頃でしたか？</p>
      <p class="card-name-big">${esc(eventObj.label)}</p>
      <p class="card-name-sub">近いところをタップしてください。あとから直せます。</p>
      <div id="bandList"></div>
      <button type="button" class="link-btn" id="unknownBtn">わからない →</button>
    </div>`;
  document.getElementById('screen').innerHTML = html;

  const listEl = document.getElementById('bandList');
  bands.forEach((band, i)=>{
    const hint = buildBandCardLabel(band);
    const row = document.createElement('div');
    row.className = 'option';
    row.style.marginBottom = '10px';
    row.innerHTML = `${esc(band.label)}${hint ? `<div class="small">${esc(hint)}</div>` : ''}`;
    const handler = ()=>{
      state.eventPlacements[key] = {bandIndex:i};
      goTo('ch5_place');
    };
    row.onclick = handler;
    makeFocusable(row, handler);
    listEl.appendChild(row);
  });
  document.getElementById('unknownBtn').onclick = ()=>{
    state.eventPlacements[key] = 'unknown';
    goTo('ch5_place');
  };

  setFooter({secondaryLabel:'戻る', secondaryFn:goBack});
}

function stepCh5Done(){
  const bands = buildAgeBands();
  const rowsHtml = bands.map((band, i)=>{
    const eventsHere = Object.keys(state.eventPlacements).filter(k=>{
      const p = state.eventPlacements[k];
      return p && typeof p==='object' && p.bandIndex===i;
    }).map(k=>esc(findEventLabel(k)));
    const hospitalsHere = hospitalsInBand(band).map(h=>{
      const name = h.nameUnknown ? `（${esc(h.hospitalType) || '病院名不明'}）` : (esc(h.name) || '（未入力）');
      return `通院：${name}`;
    });
    const items = [...hospitalsHere, ...eventsHere];
    const itemsHtml = items.length
      ? `<ul style="margin:4px 0 0;padding-left:18px;font-size:13px;">${items.map(t=>`<li>${t}</li>`).join('')}</ul>`
      : '<p class="small" style="margin:4px 0 0;">記録なし</p>';
    return `<div class="timeline-row" style="flex-direction:column;align-items:flex-start;"><span>${esc(band.label)}</span>${itemsHtml}</div>`;
  }).join('');

  const gaps = computeGaps();
  const gapHtml = gaps.map(g=>
    `<div class="timeline-row gap">${esc(g.fromLabel)}〜${esc(g.toLabel)}は、通院していない時期です</div>`
  ).join('');

  const unknownKeys = Object.keys(state.eventPlacements).filter(k=>state.eventPlacements[k]==='unknown');
  const unknownHtml = unknownKeys.length
    ? `<p class="small" style="margin-top:14px;">時期がわからない出来事：${unknownKeys.map(k=>esc(findEventLabel(k))).join('・')}</p>`
    : '';

  // 出力内容についての注意書き（常時表示）。件数超過の有無に関わらず、出力対象の範囲を明示する。
  const exportNoticeHtml = `
    <div class="hint" style="background:var(--accent-soft);color:var(--ink);margin-top:14px;">
      <p style="margin:0 0 6px;font-weight:600;">出力される内容について</p>
      <ul style="margin:0;padding-left:18px;line-height:1.7;">
        <li>様式に書き出されるのは、病院の通院期間＋通院していない期間を合わせて5件までです。6件目以降は、この試作版では出力されません。必要に応じて、Excel出力後にお手元で追記してください。</li>
        <li>傷病名・発病時期・初診日など、診断書等との整合が必要な項目は、この試作版では出力対象に含まれていません。</li>
        <li>出力されるのは様式（02.xlsx）の一部です。すべての項目が埋まるわけではありません。</li>
      </ul>
    </div>`;

  // 5期間超の警告：通院記録＋通院空白の合計が6件以上の場合、今回の具体的な件数を明示する（上のexportNoticeHtmlの補足）
  const totalPeriodCount = state.hospitals.length + gaps.length;
  const overflowWarningHtml = totalPeriodCount > 5
    ? `<p class="hint" style="background:var(--warn-soft);color:var(--warn);margin-top:14px;">今回は通院期間・通院していない期間が合計${totalPeriodCount}件あるため、6件目以降は出力に含まれません。</p>`
    : '';

  document.getElementById('screen').innerHTML = `
    <div class="card">
      <h2>年表ができました</h2>
      ${rowsHtml}
      ${gapHtml ? `<div style="margin-top:12px;">${gapHtml}</div>` : ''}
      ${unknownHtml}
      <button type="button" class="link-btn" id="editPlacementBtn" style="margin-top:14px;">出来事の配置を直す →</button>

      <div class="edit-section" style="margin-top:18px;">
        <p class="edit-section-label">申立書の下書きを作る</p>
        <p class="small" style="margin:0 0 10px;">ここまでの内容を、申立書の様式（Excel）に書き込んでダウンロードします。ざっくりでよいので、後で自由に書き直してください。</p>
        ${exportNoticeHtml}
        ${overflowWarningHtml}
        <button type="button" id="exportFormBtn" style="width:100%;padding:12px;border-radius:8px;border:none;background:var(--accent-strong);color:#fff;font-size:15px;cursor:pointer;">申立書（Excel）をダウンロード</button>
        <p class="small" id="exportFormStatus" style="margin-top:8px;color:var(--accent-strong);"></p>
      </div>

      <div class="edit-section" style="margin-top:18px;">
        <p class="edit-section-label">感想を聞かせてください</p>
        <p class="small" style="margin:0 0 10px;">この試作版を使ってみて、疲れた・迷った・しんどかった箇所などがあれば教えてください。匿名で1〜2分で答えられます。</p>
        <a href="https://forms.gle/37S6afTDaJqJSmd79" target="_blank" rel="noopener" style="display:block;text-align:center;width:100%;padding:12px;border-radius:8px;border:1px solid var(--accent-strong);background:#fff;color:var(--accent-strong);font-size:15px;text-decoration:none;box-sizing:border-box;">感想フォームを開く（Googleフォーム）</a>
      </div>

      <div class="edit-section">
        <p class="edit-section-label">前の内容を修正する</p>
        <div class="edit-section-grid">
          <button type="button" class="edit-chip" data-edit-chapter="ch1_work_status">就労状況を修正</button>
          <button type="button" class="edit-chip" data-edit-chapter="ch2_intro">今の生活を修正</button>
          <button type="button" class="edit-chip" data-edit-chapter="ch3_events">出来事を修正</button>
          <button type="button" class="edit-chip" data-edit-chapter="${state.hospitals.length>0 ? 'ch4_summary' : 'ch4_intro'}">通院記録を修正</button>
        </div>
      </div>

      <div class="edit-section">
        <p class="edit-section-label">保存データの削除</p>
        <p class="small" style="margin:0 0 10px;">この端末に保存されている入力内容を削除して、最初からやり直します。</p>
        <button type="button" id="restartFromScratchBtn" style="width:100%;padding:12px;border-radius:8px;border:1px solid var(--danger);background:var(--danger-soft);color:var(--danger);font-size:15px;cursor:pointer;">最初からやり直す</button>
      </div>
    </div>`;
  document.getElementById('editPlacementBtn').onclick = ()=>goTo('ch5_edit');
  document.getElementById('restartFromScratchBtn').onclick = ()=>{
    const ok = confirm('保存されている入力内容を削除して、最初からやり直します。よろしいですか？');
    if(!ok) return;
    clearStateStorage();
    resetState();
    current = 'start';
    showScreen();
  };
  document.getElementById('exportFormBtn').onclick = async ()=>{
    const btn = document.getElementById('exportFormBtn');
    const statusEl = document.getElementById('exportFormStatus');
    btn.disabled = true;
    btn.textContent = '作成中…';
    statusEl.textContent = '';
    try{
      await exportToOfficialForm();
      statusEl.textContent = 'ダウンロードしました。';
    }catch(err){
      console.error(err);
      statusEl.textContent = '作成に失敗しました。もう一度お試しください。';
    }finally{
      btn.disabled = false;
      btn.textContent = '申立書（Excel）をダウンロード';
    }
  };
  document.querySelectorAll('[data-edit-chapter]').forEach(btn=>{
    btn.onclick = ()=>{
      state.returnTo = 'ch5_done';
      goTo(btn.getAttribute('data-edit-chapter'));
    };
  });
  setFooter({secondaryLabel:'戻る', secondaryFn:goBack});
}

function stepCh5Edit(){
  const bands = buildAgeBands();
  let html = `<div class="card"><h2>出来事の配置を直す</h2><p class="lead">選んだ出来事の時期を、あとから変更できます。</p>`;
  state.selectedEvents.forEach(ev=>{
    html += `<label class="field-label">${esc(ev.label)}</label><div class="chip-group" id="edit_${esc(ev.id)}"></div>`;
  });
  html += '</div>';
  document.getElementById('screen').innerHTML = html;

  state.selectedEvents.forEach(ev=>{
    const key = ev.id;
    const options = bands.map(b=>b.label).concat(['わからない']);
    const current = state.eventPlacements[key];
    const currentLabel = current==='unknown' ? 'わからない' : (current && typeof current==='object' ? bands[current.bandIndex].label : null);
    renderChipGroup('edit_'+key, options, currentLabel ? [currentLabel] : [], false, v=>{
      if(v==='わからない'){
        state.eventPlacements[key] = 'unknown';
      } else {
        const idx = bands.findIndex(b=>b.label===v);
        if(idx>=0) state.eventPlacements[key] = {bandIndex:idx};
      }
    });
  });

  setFooter({secondaryLabel:'戻る', secondaryFn:goBack, primaryLabel:'年表に戻る', primaryEnabled:true, primaryFn:()=>goTo('ch5_done')});
}

function stepCh2Intro(){
  const changedNotice = state.workStatusJustChanged
    ? `<p class="small" style="margin-top:-8px;margin-bottom:16px;color:var(--warn);">就労状況が変更されたため、この先の内容をもう一度確認してください。</p>`
    : '';
  state.workStatusJustChanged = false;
  document.getElementById('screen').innerHTML = `
    <div class="card">
      <h2>今の生活について、もう少し教えてください</h2>
      <p class="lead">最後に、今の仕事や日常生活についての詳しい状況を教えてください。</p>
      ${changedNotice}
    </div>`;
  setFooter({secondaryLabel:'戻る', secondaryFn:goBack, primaryLabel:'はじめる', primaryEnabled:true, primaryFn:()=>{
    if(state.work.status==='working') goTo('ch2_work_detail');
    else goTo('ch2_notwork_reason');
  }});
}

function stepCh2WorkDetail(){
  document.getElementById('screen').innerHTML = `
    <div class="card">
      <h2>仕事の内容を教えてください</h2>
      <label class="field-label">職種・仕事の内容（短くでOK）</label>
      <input type="text" id="jobType" />
      <label class="field-label">通勤方法（複数選択可）</label>
      <div class="chip-group" id="commuteChips"></div>
      <label class="field-label">片道の通勤時間</label>
      <div class="chip-group" id="commuteTimeChips"></div>
      <label class="field-label">先月の出勤日数（およそ）</label>
      <input type="number" id="workDays" min="0" max="31" />
      <label class="field-label">仕事中・終わった後の体や気持ちの状態</label>
      <div class="chip-group" id="conditionChips"></div>
    </div>`;
  const jobTypeEl = document.getElementById('jobType');
  jobTypeEl.value = state.work.jobType;
  jobTypeEl.oninput = e=>state.work.jobType = e.target.value;
  const workDaysEl = document.getElementById('workDays');
  workDaysEl.value = state.work.workDays;
  workDaysEl.oninput = e=>state.work.workDays = e.target.value;
  renderChipGroup('commuteChips', COMMUTE_METHOD, state.work.commute, true, ()=>{});
  renderChipGroup('commuteTimeChips', COMMUTE_TIME, state.work.commuteTime ? [state.work.commuteTime] : [], false, v=>{ state.work.commuteTime = v; });
  renderChipGroup('conditionChips', WORK_CONDITION, state.work.condition, true, ()=>{});
  setFooter({secondaryLabel:'戻る', secondaryFn:goBack, primaryLabel:'次へ', primaryEnabled:true, primaryFn:()=>goTo('ch2_adl')});
}

function stepCh2NotworkReason(){
  document.getElementById('screen').innerHTML = `
    <div class="card">
      <h2>仕事をしていない理由を教えてください</h2>
      <p class="lead">当てはまるものをすべて選んでください</p>
      <div id="reasonList"></div>
    </div>`;
  renderStringCheckList('reasonList', NOTWORK_REASONS.map(l=>[l,l]), state.notWorkReasons);
  setFooter({secondaryLabel:'戻る', secondaryFn:goBack, primaryLabel:'次へ', primaryEnabled:true, primaryFn:()=>goTo('ch2_adl')});
}

function stepCh2Adl(){
  let html = `<div class="card"><h2>最近の日常生活について教えてください</h2><p class="lead">それぞれ近いものを選んでください</p>`;
  ADL_ITEMS.forEach(([key,label])=>{
    html += `<div class="adl-item"><div class="adl-label">${label}</div><div class="chip-group adl-options" id="adl_${key}"></div></div>`;
  });
  html += '</div>';
  document.getElementById('screen').innerHTML = html;
  ADL_ITEMS.forEach(([key])=>{
    const container = document.getElementById('adl_'+key);
    ADL_LEVELS.forEach(levelLabel=>{
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'chip' + (state.adl[key]===levelLabel ? ' chip-selected' : '');
      btn.textContent = levelLabel;
      btn.onclick = ()=>{
        state.adl[key] = levelLabel;
        container.querySelectorAll('.chip').forEach(c=>c.classList.remove('chip-selected'));
        btn.classList.add('chip-selected');
      };
      container.appendChild(btn);
    });
  });
  setFooter({secondaryLabel:'戻る', secondaryFn:goBack, primaryLabel:'次へ', primaryEnabled:true, primaryFn:()=>goTo('ch2_other')});
}

function stepCh2Other(){
  document.getElementById('screen').innerHTML = `
    <div class="card">
      <h2>その他、生活で困っていることは？</h2>
      <div id="otherList"></div>
      <label class="field-label">補足（任意）</label>
      <textarea id="otherNote"></textarea>
    </div>`;
  renderStringCheckList('otherList', OTHER_DIFFICULTIES.map(l=>[l,l]), state.otherChips);
  const noteEl = document.getElementById('otherNote');
  noteEl.value = state.otherNote;
  noteEl.oninput = e=>state.otherNote = e.target.value;
  setFooter({secondaryLabel:'戻る', secondaryFn:goBack, primaryLabel:'第3章へ進む', primaryEnabled:true, primaryFn:()=>{
    finishChapter('ch2', 'ch3_intro');
  }});
}

const STEPS = {
  start: stepStart,
  profile_birth: stepProfileBirth,
  profile_band_size: stepProfileBandSize,
  ch1_work_status: stepCh1WorkStatus,
  ch3_intro: stepCh3Intro,
  ch3_events: stepCh3Events,
  ch3_done: stepCh3Done,
  ch4_intro: stepCh4Intro,
  ch4_hospital_name: stepCh4HospitalName,
  ch4_memory_dig: stepCh4MemoryDig,
  ch4_period: stepCh4Period,
  ch4_confidence: stepCh4Confidence,
  ch4_gap_review: stepCh4GapReview,
  ch4_summary: stepCh4Summary,
  ch5_intro: stepCh5Intro,
  ch5_place: stepCh5Place,
  ch5_done: stepCh5Done,
  ch5_edit: stepCh5Edit,
  ch2_intro: stepCh2Intro,
  ch2_work_detail: stepCh2WorkDetail,
  ch2_notwork_reason: stepCh2NotworkReason,
  ch2_adl: stepCh2Adl,
  ch2_other: stepCh2Other
};

function showScreen(){
  document.getElementById('taskHeader').style.display = '';
  renderTasks();
  STEPS[current]();
}

resetState();
current = 'start';
const savedPayload = loadStateFromStorage();
if(savedPayload){
  document.getElementById('taskHeader').style.display = 'none';
  stepResumeCheck(savedPayload);
} else {
  showScreen();
}
</script>
</body>
</html>
